<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Reloj NFC - Cada 15 minutos</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0b3b3f, #1a2a3a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            touch-action: manipulation;
            cursor: pointer;
            overflow: hidden;
        }
        #welcomeScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #0f2027, #203a43);
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: opacity 0.8s ease;
        }
        .touch-indicator {
            animation: pulse 1.5s infinite;
            background: rgba(255,255,255,0.15);
            padding: 25px 40px;
            border-radius: 80px;
            margin-top: 30px;
            border: 2px solid rgba(255,255,255,0.3);
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; box-shadow: 0 0 0 0 rgba(0, 255, 255, 0.4);}
            70% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 0 20px rgba(0, 255, 255, 0);}
            100% { transform: scale(1); opacity: 0.6; box-shadow: 0 0 0 0 rgba(0, 255, 255, 0);}
        }
        .nfc-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }
        .welcome-title {
            font-size: 2.2rem;
            margin-bottom: 20px;
            text-shadow: 0 0 15px cyan;
        }
        .welcome-subtitle {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        .small-note {
            margin-top: 60px;
            font-size: 0.8rem;
            opacity: 0.6;
        }
        .reloj {
            background: rgba(0,0,0,0.7);
            padding: 1.5rem;
            border-radius: 2rem;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            max-width: 550px;
            width: 90%;
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.6s ease;
        }
        .reloj.visible {
            opacity: 1;
            transform: scale(1);
        }
        .hora {
            font-size: 3.5rem;
            font-weight: bold;
            letter-spacing: 5px;
            margin: 15px 0;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px #00ffcc;
        }
        .estado {
            margin-top: 15px;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .badge {
            background: #27ae60;
            color: black;
            padding: 4px 10px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 10px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .info {
            font-size: 0.75rem;
            margin-top: 10px;
            opacity: 0.8;
        }
        .fantasma {
            background: #8e44ad;
            margin-top: 10px;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

    <div id="welcomeScreen">
        <div class="nfc-icon">📱➡️🏷️ 👻</div>
        <div class="welcome-title">Reloj NFC Fantasma</div>
        <div class="welcome-subtitle">🔓 TOQUE EN CUALQUIER LUGAR</div>
        <div class="touch-indicator">✨ TOCA LA PANTALLA ✨</div>
        <div class="small-note">(Solo un toque al abrir - luego dice la hora cada 15 minutos)</div>
    </div>

    <div class="reloj" id="relojContainer">
        <div class="badge">🔓 ACTIVADO | 👻 MODO FANTASMA</div>
        <h1>🗣️ Reloj Inteligente</h1>
        <div class="hora" id="horaPantalla">--:--:--</div>
        <div class="estado" id="estado">🎭 Esperando activación...</div>
        <div class="info">⏰ Dice la hora CADA 15 MINUTOS (00, 15, 30, 45)</div>
        <div class="info fantasma" id="fantasmaStatus">🔇 Sonido fantasma: INACTIVO</div>
    </div>

    <script>
        let vozDesbloqueada = false;
        let ultimoCuartoHabla = -1;
        let audioContext = null;
        let silentSource = null;
        let sonidoFantasmaActivo = false;
        
        const welcomeDiv = document.getElementById('welcomeScreen');
        const relojDiv = document.getElementById('relojContainer');
        const horaPantalla = document.getElementById('horaPantalla');
        const estadoDiv = document.getElementById('estado');
        const fantasmaStatus = document.getElementById('fantasmaStatus');

        function formatearHoraPantalla(date) {
            return date.toLocaleTimeString('es-ES', { hour12: false });
        }

        function obtenerTextoHora() {
            const ahora = new Date();
            let horas = ahora.getHours();
            let minutos = ahora.getMinutes();

            let textoHora = "";
            
            // Formato 12h para hablar
            let hora12 = horas % 12;
            if (hora12 === 0) hora12 = 12;
            
            if (minutos === 0) {
                textoHora = `${hora12} en punto`;
            } else if (minutos === 15) {
                textoHora = `${hora12} y cuarto`;
            } else if (minutos === 30) {
                textoHora = `${hora12} y media`;
            } else if (minutos === 45) {
                // Para menos cuarto, sumamos 1 a la hora
                let siguienteHora = (horas + 1) % 12;
                if (siguienteHora === 0) siguienteHora = 12;
                textoHora = `un cuarto para las ${siguienteHora}`;
            } else {
                // Por si acaso (no debería ocurrir con la lógica actual)
                textoHora = `${hora12} y ${minutos} minutos`;
            }
            
            return textoHora;
        }

        function decirHora() {
            if (!vozDesbloqueada) return;
            if (!('speechSynthesis' in window)) return;

            const textoHora = obtenerTextoHora();
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(textoHora);
            utterance.lang = 'es-ES';
            utterance.rate = 0.9;
            utterance.pitch = 1;
            
            estadoDiv.innerText = `🗣️ "${textoHora}"`;
            
            utterance.onend = () => {
                setTimeout(() => {
                    if (estadoDiv.innerText.includes(textoHora)) {
                        estadoDiv.innerText = "✅ Próxima hora en 15 minutos";
                    }
                }, 2000);
            };
            
            window.speechSynthesis.speak(utterance);
        }

        function iniciarSonidoFantasma() {
            if (sonidoFantasmaActivo) return;
            if (!vozDesbloqueada) return;
            
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const sampleRate = audioContext.sampleRate;
                const bufferSize = sampleRate * 2;
                const buffer = audioContext.createBuffer(1, bufferSize, sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = 0;
                
                silentSource = audioContext.createBufferSource();
                silentSource.buffer = buffer;
                silentSource.loop = true;
                silentSource.connect(audioContext.destination);
                silentSource.start();
                
                if (audioContext.state === 'suspended') audioContext.resume();
                
                sonidoFantasmaActivo = true;
                fantasmaStatus.innerHTML = "👻 SONIDO FANTASMA ACTIVO ✅";
                fantasmaStatus.style.background = "#27ae60";
                
                if ('wakeLock' in navigator) navigator.wakeLock.request('screen');
            } catch (error) {
                fantasmaStatus.innerHTML = "⚠️ Modo fantasma no disponible";
            }
        }

        function activarConTacto() {
            if (vozDesbloqueada) return;
            
            vozDesbloqueada = true;
            
            welcomeDiv.style.opacity = '0';
            setTimeout(() => {
                welcomeDiv.style.display = 'none';
                relojDiv.classList.add('visible');
            }, 800);
            
            setTimeout(() => iniciarSonidoFantasma(), 500);
            setTimeout(() => {
                decirHora();
                estadoDiv.innerText = "🎉 ACTIVADO - Próxima hora en 15 minutos";
            }, 1000);
        }

        function actualizarRelojYHablar() {
            const ahora = new Date();
            horaPantalla.innerText = formatearHoraPantalla(ahora);
            if (!vozDesbloqueada) return;
            
            const minutosActuales = ahora.getMinutes();
            const segundosActuales = ahora.getSeconds();
            
            // Detectar si estamos en un cuarto de hora (00, 15, 30, 45)
            const esCuartoDeHora = [0, 15, 30, 45].includes(minutosActuales);
            
            // Hablar exactamente cuando cambia el minuto a un cuarto de hora
            if (esCuartoDeHora && segundosActuales === 0 && minutosActuales !== ultimoCuartoHabla) {
                decirHora();
                ultimoCuartoHabla = minutosActuales;
                if (audioContext && audioContext.state === 'suspended') audioContext.resume();
            }
        }

        welcomeDiv.addEventListener('click', activarConTacto);
        welcomeDiv.addEventListener('touchstart', activarConTacto);
        
        if ('speechSynthesis' in window) {
            const silentUtterance = new SpeechSynthesisUtterance('');
            silentUtterance.volume = 0;
            window.speechSynthesis.speak(silentUtterance);
        }
        
        setInterval(actualizarRelojYHablar, 1000);
        actualizarRelojYHablar();
        
        document.addEventListener('visibilitychange', () => {
            if (!vozDesbloqueada) return;
            if (document.hidden && audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
        });
    </script>
</body>
</html>
