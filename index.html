<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Reloj NFC - Simple</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0b3b3f, #1a2a3a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .reloj {
            background: rgba(0,0,0,0.7);
            padding: 2rem;
            border-radius: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
        }
        .hora {
            font-size: 4rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px #00ffcc;
            margin: 20px 0;
        }
        .estado {
            margin-top: 15px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 15px;
            font-size: 0.9rem;
        }
        button {
            background: #2ed573;
            border: none;
            color: black;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            margin: 10px;
            cursor: pointer;
        }
        .badge {
            background: #f39c12;
            color: black;
            padding: 5px 12px;
            border-radius: 20px;
            display: inline-block;
            font-size: 0.7rem;
        }
        select {
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px;
            border-radius: 20px;
            margin: 10px;
        }
        .keep-badge {
            background: #2ed57333;
            padding: 5px;
            border-radius: 10px;
            font-size: 0.7rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="reloj">
        <div class="badge">🔊 RELOJ NFC</div>
        <h1>🗣️ Reloj Parlante</h1>
        <div class="hora" id="horaPantalla">--:--:--</div>
        
        <select id="idiomaSelect">
            <option value="es">🇪🇸 Español</option>
            <option value="en">🇺🇸 English</option>
            <option value="fr">🇫🇷 Français</option>
            <option value="de">🇩🇪 Deutsch</option>
            <option value="it">🇮🇹 Italiano</option>
            <option value="pt">🇵🇹 Português</option>
        </select>
        
        <button id="activarBtn">🔊 ACTIVAR RELOJ (TOCAR AQUÍ)</button>
        <button id="probarBtn">🔊 PROBAR VOZ</button>
        
        <div class="estado" id="estado">⚡ Presiona "ACTIVAR RELOJ"</div>
        <div class="keep-badge" id="keepStatus">🎵 Ultrasonido: INACTIVO</div>
        <div class="keep-badge" id="pingStatus"></div>
    </div>

    <script>
        // ============ VARIABLES ============
        let activado = false;
        let ultimoMinuto = -1;
        let idioma = 'es';
        
        // Keep-alive
        let audioCtx = null;
        let keepInterval = null;
        let keepActivo = false;
        
        // Elementos
        const horaSpan = document.getElementById('horaPantalla');
        const estadoSpan = document.getElementById('estado');
        const keepSpan = document.getElementById('keepStatus');
        const pingSpan = document.getElementById('pingStatus');
        const activarBtn = document.getElementById('activarBtn');
        const probarBtn = document.getElementById('probarBtn');
        const idiomaSelect = document.getElementById('idiomaSelect');
        
        // ============ FUNCIÓN PRINCIPAL: KEEP-ALIVE ============
        async function iniciarKeepAlive() {
            if (keepActivo) return;
            
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }
                
                // Oscilador continuo de 19kHz
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = 19000;
                gain.gain.value = 0.001;
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                
                // Pings cada 10 segundos
                let pingCount = 0;
                keepInterval = setInterval(() => {
                    if (audioCtx && audioCtx.state === 'suspended') {
                        audioCtx.resume();
                    }
                    pingCount++;
                    pingSpan.innerHTML = `🔊 Ping #${pingCount} - ${new Date().toLocaleTimeString()}`;
                    console.log("PING KEEP-ALIVE", pingCount);
                }, 10000);
                
                keepActivo = true;
                keepSpan.innerHTML = '🎵 Ultrasonido 19kHz: ACTIVO ✅';
                keepSpan.style.background = '#2ed57355';
                console.log("✅ Keep-alive iniciado");
                
            } catch(e) {
                console.error("Error keep-alive:", e);
                keepSpan.innerHTML = '⚠️ Keep-alive FALLBACK (vibración)';
                keepInterval = setInterval(() => {
                    pingSpan.innerHTML = `💓 Ping ${new Date().toLocaleTimeString()}`;
                }, 10000);
                keepActivo = true;
            }
        }
        
        // ============ FUNCIONES DE VOZ ============
        function obtenerTextoHora() {
            const ahora = new Date();
            let horas = ahora.getHours();
            let minutos = ahora.getMinutes();
            let hora12 = horas % 12;
            if (hora12 === 0) hora12 = 12;
            
            const textos = {
                'es': () => {
                    if (minutos === 0) return `${hora12} en punto`;
                    if (minutos === 15) return `${hora12} y cuarto`;
                    if (minutos === 30) return `${hora12} y media`;
                    if (minutos === 45) return `un cuarto para las ${(horas+1)%12 || 12}`;
                    return `${hora12} y ${minutos} minutos`;
                },
                'en': () => {
                    const ampm = horas < 12 ? 'AM' : 'PM';
                    if (minutos === 0) return `${hora12} o'clock ${ampm}`;
                    if (minutos === 15) return `quarter past ${hora12} ${ampm}`;
                    if (minutos === 30) return `half past ${hora12} ${ampm}`;
                    if (minutos === 45) return `quarter to ${(horas+1)%12 || 12} ${ampm}`;
                    return `${hora12} ${minutos} ${ampm}`;
                },
                'fr': () => {
                    if (minutos === 0) return `${hora12} heures`;
                    if (minutos === 15) return `${hora12} heures et quart`;
                    if (minutos === 30) return `${hora12} heures et demie`;
                    if (minutos === 45) return `moins le quart ${(horas+1)%12 || 12} heures`;
                    return `${hora12} heures ${minutos}`;
                },
                'de': () => {
                    if (minutos === 0) return `${hora12} Uhr`;
                    if (minutos === 15) return `Viertel nach ${hora12}`;
                    if (minutos === 30) return `halb ${hora12+1}`;
                    if (minutos === 45) return `Viertel vor ${(horas+1)%12 || 12}`;
                    return `${hora12} Uhr ${minutos}`;
                },
                'it': () => {
                    if (minutos === 0) return `${hora12} in punto`;
                    if (minutos === 15) return `${hora12} e un quarto`;
                    if (minutos === 30) return `${hora12} e mezza`;
                    if (minutos === 45) return `un quarto alle ${(horas+1)%12 || 12}`;
                    return `${hora12} e ${minutos} minuti`;
                },
                'pt': () => {
                    if (minutos === 0) return `${hora12} em ponto`;
                    if (minutos === 15) return `${hora12} e quinze`;
                    if (minutos === 30) return `${hora12} e meia`;
                    if (minutos === 45) return `um quarto para as ${(horas+1)%12 || 12}`;
                    return `${hora12} e ${minutos} minutos`;
                }
            };
            return textos[idioma] ? textos[idioma]() : textos['es']();
        }
        
        function decirHora() {
            if (!activado) {
                console.log("No activado, no hablo");
                return;
            }
            
            const texto = obtenerTextoHora();
            console.log("🔊 Diciendo:", texto);
            
            const utterance = new SpeechSynthesisUtterance(texto);
            utterance.lang = idioma === 'es' ? 'es-ES' : 
                           idioma === 'en' ? 'en-US' :
                           idioma === 'fr' ? 'fr-FR' :
                           idioma === 'de' ? 'de-DE' :
                           idioma === 'it' ? 'it-IT' : 'pt-PT';
            utterance.rate = 0.9;
            
            estadoSpan.innerHTML = `🗣️ "${texto}"`;
            
            utterance.onend = () => {
                setTimeout(() => {
                    estadoSpan.innerHTML = "✅ Reloj activo - Próxima hora en 15 min";
                }, 2000);
            };
            
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }
        
        // ============ RELOJ ============
        function actualizarReloj() {
            const ahora = new Date();
            horaSpan.innerHTML = ahora.toLocaleTimeString('es-ES', { hour12: false });
            
            if (!activado) return;
            
            const minutos = ahora.getMinutes();
            const segundos = ahora.getSeconds();
            const esCuarto = [0, 15, 30, 45].includes(minutos);
            
            if (esCuarto && segundos === 0 && minutos !== ultimoMinuto) {
                console.log("⏰ ¡Toca hablar! Minuto:", minutos);
                decirHora();
                ultimoMinuto = minutos;
            }
        }
        
        // ============ ACTIVAR ============
        async function activar() {
            if (activado) {
                estadoSpan.innerHTML = "✅ Ya estaba activado";
                return;
            }
            
            console.log("🔓 ACTIVANDO RELOJ...");
            estadoSpan.innerHTML = "🔄 Activando...";
            
            // Activar flag
            activado = true;
            
            // Iniciar keep-alive
            await iniciarKeepAlive();
            
            estadoSpan.innerHTML = "✅ RELOJ ACTIVADO - Dirá la hora cada 15 minutos";
            
            // Decir la hora inmediatamente
            setTimeout(() => {
                decirHora();
            }, 500);
            
            console.log("✅ Activación completa");
        }
        
        // ============ EVENTOS ============
        activarBtn.onclick = activar;
        
        probarBtn.onclick = () => {
            if (!activado) {
                estadoSpan.innerHTML = "⚠️ Primero activa el reloj";
                return;
            }
            const prueba = new SpeechSynthesisUtterance(
                idioma === 'es' ? "Prueba de voz" :
                idioma === 'en' ? "Voice test" :
                idioma === 'fr' ? "Test de voix" :
                idioma === 'de' ? "Stimmentest" :
                idioma === 'it' ? "Prova vocale" : "Teste de voz"
            );
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(prueba);
        };
        
        idiomaSelect.onchange = (e) => {
            idioma = e.target.value;
            estadoSpan.innerHTML = `🌐 Idioma cambiado a ${idiomaSelect.options[idiomaSelect.selectedIndex].text}`;
        };
        
        // Precargar
        if ('speechSynthesis' in window) {
            const silent = new SpeechSynthesisUtterance('');
            silent.volume = 0;
            window.speechSynthesis.speak(silent);
        }
        
        // Reloj visual
        setInterval(actualizarReloj, 1000);
        actualizarReloj();
        
        console.log("✅ Página cargada - Presiona 'ACTIVAR RELOJ'");
    </script>
</body>
</html>
