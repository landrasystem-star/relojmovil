<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Reloj NFC - ESTRUCTURA WALKIE</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0b3b3f, #1a2a3a);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .container {
            background: rgba(0,0,0,0.7);
            padding: 2rem;
            border-radius: 2rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .hora {
            font-size: 4rem;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px #00ffcc;
            margin: 20px 0;
        }
        .estado {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 15px;
            margin: 10px 0;
            font-size: 0.9rem;
        }
        button {
            background: #2ed573;
            border: none;
            color: black;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            margin: 10px;
            cursor: pointer;
        }
        .badge {
            background: #f39c12;
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        select {
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px;
            border-radius: 20px;
            margin: 10px;
        }
        .info {
            font-size: 0.7rem;
            margin-top: 15px;
            opacity: 0.7;
        }
        .ultrasonido-status {
            background: #2ed57333;
            padding: 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">🔊 WALKIE STRUCTURE</div>
        <h1>🗣️ Reloj Parlante</h1>
        <div class="hora" id="horaPantalla">--:--:--</div>
        
        <select id="idiomaSelect">
            <option value="es">🇪🇸 Español</option>
            <option value="en">🇺🇸 English</option>
            <option value="fr">🇫🇷 Français</option>
            <option value="de">🇩🇪 Deutsch</option>
            <option value="it">🇮🇹 Italiano</option>
            <option value="pt">🇵🇹 Português</option>
        </select>
        
        <button id="activarBtn">🎤 ACTIVAR WALKIE MODE</button>
        <button id="probarBtn">🔊 PROBAR VOZ</button>
        
        <div class="estado" id="estado">⚡ Presiona "ACTIVAR WALKIE MODE"</div>
        <div class="ultrasonido-status" id="ultrasonidoStatus">🎵 Ultrasonido: INACTIVO</div>
        <div class="info">📻 Modo walkie: mismo sistema que usa tu walkie-talkie</div>
    </div>

    <script>
        // ============ VARIABLES GLOBALES (ESTRUCTURA WALKIE) ============
        let activado = false;
        let idioma = 'es';
        let ultimoMinutoHablado = -1;
        
        // ============ VARIABLES DE ULTRASONIDO (EXACTAS DEL WALKIE) ============
        let ghostAudioContext = null;
        let ghostInterval = null;
        let keepAliveActive = false;
        let silentOscillator = null;
        
        // Elementos DOM
        const horaSpan = document.getElementById('horaPantalla');
        const estadoSpan = document.getElementById('estado');
        const ultrasonidoSpan = document.getElementById('ultrasonidoStatus');
        const activarBtn = document.getElementById('activarBtn');
        const probarBtn = document.getElementById('probarBtn');
        const idiomaSelect = document.getElementById('idiomaSelect');
        
        // ============ FUNCIÓN DE ULTRASONIDO (COPIADA DEL WALKIE) ============
        async function iniciarUltrasonido() {
            if (keepAliveActive) return;
            
            try {
                console.log("🎵 Iniciando ultrasonido walkie...");
                
                ghostAudioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                if (ghostAudioContext.state === 'suspended') {
                    await ghostAudioContext.resume();
                }
                
                const oscillator = ghostAudioContext.createOscillator();
                const gain = ghostAudioContext.createGain();
                
                oscillator.type = 'sine';
                oscillator.frequency.value = 19000;
                gain.gain.value = 0.001;
                
                oscillator.connect(gain);
                gain.connect(ghostAudioContext.destination);
                oscillator.start();
                
                silentOscillator = oscillator;
                
                ghostInterval = setInterval(() => {
                    if (ghostAudioContext && keepAliveActive) {
                        try {
                            if (ghostAudioContext.state === 'suspended') {
                                ghostAudioContext.resume();
                                console.log("🔄 AudioContext reanudado");
                            }
                            
                            const shortBeep = ghostAudioContext.createOscillator();
                            const beepGain = ghostAudioContext.createGain();
                            shortBeep.type = 'sine';
                            shortBeep.frequency.value = 18000;
                            beepGain.gain.value = 0.0005;
                            shortBeep.connect(beepGain);
                            beepGain.connect(ghostAudioContext.destination);
                            shortBeep.start();
                            shortBeep.stop(ghostAudioContext.currentTime + 0.05);
                            
                            console.log("🔊 Ping walkie");
                        } catch(e) {}
                    }
                }, 15000);
                
                keepAliveActive = true;
                ultrasonidoSpan.innerHTML = '🎵 Ultrasonido 19kHz: ACTIVO ✅';
                ultrasonidoSpan.style.background = '#2ed57355';
                console.log("✅ Ultrasonido walkie activado");
                
            } catch(e) {
                console.error("❌ Error ultrasonido:", e);
                ultrasonidoSpan.innerHTML = '⚠️ Error: sin ultrasonido';
            }
        }
        
        // ============ FUNCIÓN DE VOZ ============
        function obtenerTextoHora() {
            const ahora = new Date();
            let horas = ahora.getHours();
            let minutos = ahora.getMinutes();
            let hora12 = horas % 12;
            if (hora12 === 0) hora12 = 12;
            
            const textos = {
                'es': () => {
                    if (minutos === 0) return `${hora12} en punto`;
                    if (minutos === 15) return `${hora12} y cuarto`;
                    if (minutos === 30) return `${hora12} y media`;
                    if (minutos === 45) return `un cuarto para las ${(horas+1)%12 || 12}`;
                    return `${hora12} y ${minutos} minutos`;
                },
                'en': () => {
                    const ampm = horas < 12 ? 'AM' : 'PM';
                    if (minutos === 0) return `${hora12} o'clock ${ampm}`;
                    if (minutos === 15) return `quarter past ${hora12} ${ampm}`;
                    if (minutos === 30) return `half past ${hora12} ${ampm}`;
                    if (minutos === 45) return `quarter to ${(horas+1)%12 || 12} ${ampm}`;
                    return `${hora12} ${minutos} ${ampm}`;
                },
                'fr': () => {
                    if (minutos === 0) return `${hora12} heures`;
                    if (minutos === 15) return `${hora12} heures et quart`;
                    if (minutos === 30) return `${hora12} heures et demie`;
                    if (minutos === 45) return `moins le quart ${(horas+1)%12 || 12} heures`;
                    return `${hora12} heures ${minutos}`;
                },
                'de': () => {
                    if (minutos === 0) return `${hora12} Uhr`;
                    if (minutos === 15) return `Viertel nach ${hora12}`;
                    if (minutos === 30) return `halb ${hora12+1}`;
                    if (minutos === 45) return `Viertel vor ${(horas+1)%12 || 12}`;
                    return `${hora12} Uhr ${minutos}`;
                },
                'it': () => {
                    if (minutos === 0) return `${hora12} in punto`;
                    if (minutos === 15) return `${hora12} e un quarto`;
                    if (minutos === 30) return `${hora12} e mezza`;
                    if (minutos === 45) return `un quarto alle ${(horas+1)%12 || 12}`;
                    return `${hora12} e ${minutos} minuti`;
                },
                'pt': () => {
                    if (minutos === 0) return `${hora12} em ponto`;
                    if (minutos === 15) return `${hora12} e quinze`;
                    if (minutos === 30) return `${hora12} e meia`;
                    if (minutos === 45) return `um quarto para as ${(horas+1)%12 || 12}`;
                    return `${hora12} e ${minutos} minutos`;
                }
            };
            return textos[idioma] ? textos[idioma]() : textos['es']();
        }
        
        function decirHora() {
            if (!activado) return;
            
            const texto = obtenerTextoHora();
            console.log("🔊 Diciendo:", texto);
            
            const utterance = new SpeechSynthesisUtterance(texto);
            utterance.lang = idioma === 'es' ? 'es-ES' : 
                           idioma === 'en' ? 'en-US' :
                           idioma === 'fr' ? 'fr-FR' :
                           idioma === 'de' ? 'de-DE' :
                           idioma === 'it' ? 'it-IT' : 'pt-PT';
            utterance.rate = 0.9;
            
            estadoSpan.innerHTML = `🗣️ "${texto}"`;
            
            utterance.onend = () => {
                setTimeout(() => {
                    if (estadoSpan.innerHTML.includes(texto)) {
                        estadoSpan.innerHTML = "✅ Activo - Próxima hora en 15 min";
                    }
                }, 2000);
            };
            
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }
        
        function probarVoz() {
            if (!activado) {
                estadoSpan.innerHTML = "⚠️ Activa el walkie mode primero";
                return;
            }
            const mensajes = {
                'es': "Prueba de voz funcionando",
                'en': "Voice test working",
                'fr': "Test de voix fonctionne",
                'de': "Sprachtest funktioniert",
                'it': "Prova vocale funziona",
                'pt': "Teste de voz funcionando"
            };
            const utterance = new SpeechSynthesisUtterance(mensajes[idioma]);
            utterance.lang = idioma === 'es' ? 'es-ES' : 
                           idioma === 'en' ? 'en-US' :
                           idioma === 'fr' ? 'fr-FR' :
                           idioma === 'de' ? 'de-DE' :
                           idioma === 'it' ? 'it-IT' : 'pt-PT';
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }
        
        // ============ RELOJ ============
        function tick() {
            const ahora = new Date();
            horaSpan.innerHTML = ahora.toLocaleTimeString('es-ES', { hour12: false });
            
            if (!activado) return;
            
            const minutos = ahora.getMinutes();
            const segundos = ahora.getSeconds();
            const esCuarto = [0, 15, 30, 45].includes(minutos);
            
            if (esCuarto && segundos < 2 && minutos !== ultimoMinutoHablado) {
                console.log(`⏰ Hablando: ${minutos} minutos`);
                decirHora();
                ultimoMinutoHablado = minutos;
            }
        }
        
        // ============ ACTIVAR WALKIE MODE ============
        async function activarWalkie() {
            if (activado) {
                estadoSpan.innerHTML = "✅ Walkie mode ya activo";
                return;
            }
            
            console.log("🎤 ACTIVANDO WALKIE MODE");
            estadoSpan.innerHTML = "🔄 Activando walkie mode...";
            
            // 1. Iniciar ultrasonido (igual que el walkie)
            await iniciarUltrasonido();
            
            // 2. Activar flag
            activado = true;
            estadoSpan.innerHTML = "✅ WALKIE MODE ACTIVO - Dirá la hora cada 15 minutos";
            
            // 3. Decir hora de bienvenida
            setTimeout(() => {
                decirHora();
            }, 500);
        }
        
        // ============ EVENTOS ============
        activarBtn.onclick = activarWalkie;
        probarBtn.onclick = probarVoz;
        
        idiomaSelect.onchange = (e) => {
            idioma = e.target.value;
            estadoSpan.innerHTML = `🌐 Idioma: ${idiomaSelect.options[idiomaSelect.selectedIndex].text}`;
        };
        
        // Precargar voz
        if ('speechSynthesis' in window) {
            const silent = new SpeechSynthesisUtterance('');
            silent.volume = 0;
            window.speechSynthesis.speak(silent);
        }
        
        // Iniciar reloj
        setInterval(tick, 1000);
        tick();
        
        // Detectar cuando la pantalla se apaga (solo para log)
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                console.log("📱 Pantalla apagada - Ultrasonido debe seguir sonando");
            } else {
                console.log("📱 Pantalla encendida");
            }
        });
        
        console.log("✅ Walkie mode listo - Misma estructura que tu walkie-talkie");
    </script>
</body>
</html>
