<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Reloj NFC - Modo Llamada Activa</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0b3b3f, #1a2a3a);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .reloj {
            background: rgba(0,0,0,0.7);
            padding: 2rem;
            border-radius: 2rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .hora {
            font-size: 4rem;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px #00ffcc;
            margin: 20px 0;
        }
        .estado {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 15px;
            margin: 10px 0;
        }
        button {
            background: #2ed573;
            border: none;
            color: black;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            margin: 10px;
            cursor: pointer;
        }
        .badge {
            background: #f39c12;
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        select {
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px;
            border-radius: 20px;
            margin: 10px;
        }
        .info {
            font-size: 0.7rem;
            margin-top: 15px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="reloj">
        <div class="badge">🔊 MODO LLAMADA ACTIVA</div>
        <h1>🗣️ Reloj Parlante</h1>
        <div class="hora" id="horaPantalla">--:--:--</div>
        
        <select id="idiomaSelect">
            <option value="es">🇪🇸 Español</option>
            <option value="en">🇺🇸 English</option>
            <option value="fr">🇫🇷 Français</option>
            <option value="de">🇩🇪 Deutsch</option>
            <option value="it">🇮🇹 Italiano</option>
            <option value="pt">🇵🇹 Português</option>
        </select>
        
        <button id="activarBtn">🎤 INICIAR MODO LLAMADA</button>
        <button id="probarBtn">🔊 PROBAR VOZ</button>
        
        <div class="estado" id="estado">⚡ Presiona "INICIAR MODO LLAMADA"</div>
        <div class="info">🔊 El reloj seguirá hablando aunque apagues la pantalla</div>
    </div>

    <script>
        // ============ VARIABLES ============
        let activado = false;
        let idioma = 'es';
        let ultimoMinutoHablado = -1;
        
        // ============ AUDIO PARA MODO LLAMADA (COMO EL WALKIE) ============
        let streamActivo = null;
        let audioContextActivo = null;
        let sourceNode = null;
        let keepAliveInterval = null;
        
        // Elementos
        const horaSpan = document.getElementById('horaPantalla');
        const estadoSpan = document.getElementById('estado');
        const activarBtn = document.getElementById('activarBtn');
        const probarBtn = document.getElementById('probarBtn');
        const idiomaSelect = document.getElementById('idiomaSelect');
        
        // ============ INICIAR "MODO LLAMADA" (mantiene el navegador vivo) ============
        async function iniciarModoLlamada() {
            if (streamActivo) {
                console.log("Ya hay modo llamada activo");
                return true;
            }
            
            try {
                console.log("🎤 Iniciando modo llamada...");
                
                // 1. Obtener acceso al micrófono (como el walkie)
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                streamActivo = stream;
                
                // 2. Crear AudioContext y conectar el micrófono
                audioContextActivo = new (window.AudioContext || window.webkitAudioContext)();
                sourceNode = audioContextActivo.createMediaStreamSource(stream);
                
                // 3. Crear un nodo de ganancia y silenciar la salida (para que no se escuche)
                const gainNode = audioContextActivo.createGain();
                gainNode.gain.value = 0; // SILENCIO TOTAL - No se escucha nada
                
                sourceNode.connect(gainNode);
                gainNode.connect(audioContextActivo.destination);
                
                // 4. Iniciar el contexto
                if (audioContextActivo.state === 'suspended') {
                    await audioContextActivo.resume();
                }
                
                console.log("✅ Modo llamada activo - El navegador NO se suspenderá");
                estadoSpan.innerHTML = "🎤 MODO LLAMADA ACTIVO - El reloj hablará aunque apagues la pantalla";
                
                // 5. Mantener vivo con pings cada 5 segundos (como el walkie)
                keepAliveInterval = setInterval(() => {
                    if (audioContextActivo && audioContextActivo.state === 'suspended') {
                        audioContextActivo.resume();
                        console.log("🔄 AudioContext reanudado");
                    }
                    console.log("🔊 Keep-alive ping", new Date().toLocaleTimeString());
                }, 5000);
                
                return true;
                
            } catch(error) {
                console.error("❌ Error al iniciar modo llamada:", error);
                estadoSpan.innerHTML = "❌ Error: Permite el acceso al micrófono";
                return false;
            }
        }
        
        // ============ DETENER MODO LLAMADA ============
        function detenerModoLlamada() {
            if (keepAliveInterval) {
                clearInterval(keepAliveInterval);
                keepAliveInterval = null;
            }
            
            if (sourceNode) {
                try { sourceNode.disconnect(); } catch(e) {}
                sourceNode = null;
            }
            
            if (audioContextActivo) {
                try { audioContextActivo.close(); } catch(e) {}
                audioContextActivo = null;
            }
            
            if (streamActivo) {
                streamActivo.getTracks().forEach(track => {
                    track.stop();
                    track.enabled = false;
                });
                streamActivo = null;
            }
            
            console.log("🔇 Modo llamada detenido");
        }
        
        // ============ FUNCIONES DE VOZ ============
        function obtenerTextoHora() {
            const ahora = new Date();
            let horas = ahora.getHours();
            let minutos = ahora.getMinutes();
            let hora12 = horas % 12;
            if (hora12 === 0) hora12 = 12;
            
            const textos = {
                'es': () => {
                    if (minutos === 0) return `${hora12} en punto`;
                    if (minutos === 15) return `${hora12} y cuarto`;
                    if (minutos === 30) return `${hora12} y media`;
                    if (minutos === 45) return `un cuarto para las ${(horas+1)%12 || 12}`;
                    return `${hora12} y ${minutos} minutos`;
                },
                'en': () => {
                    const ampm = horas < 12 ? 'AM' : 'PM';
                    if (minutos === 0) return `${hora12} o'clock ${ampm}`;
                    if (minutos === 15) return `quarter past ${hora12} ${ampm}`;
                    if (minutos === 30) return `half past ${hora12} ${ampm}`;
                    if (minutos === 45) return `quarter to ${(horas+1)%12 || 12} ${ampm}`;
                    return `${hora12} ${minutos} ${ampm}`;
                },
                'fr': () => {
                    if (minutos === 0) return `${hora12} heures`;
                    if (minutos === 15) return `${hora12} heures et quart`;
                    if (minutos === 30) return `${hora12} heures et demie`;
                    if (minutos === 45) return `moins le quart ${(horas+1)%12 || 12} heures`;
                    return `${hora12} heures ${minutos}`;
                },
                'de': () => {
                    if (minutos === 0) return `${hora12} Uhr`;
                    if (minutos === 15) return `Viertel nach ${hora12}`;
                    if (minutos === 30) return `halb ${hora12+1}`;
                    if (minutos === 45) return `Viertel vor ${(horas+1)%12 || 12}`;
                    return `${hora12} Uhr ${minutos}`;
                },
                'it': () => {
                    if (minutos === 0) return `${hora12} in punto`;
                    if (minutos === 15) return `${hora12} e un quarto`;
                    if (minutos === 30) return `${hora12} e mezza`;
                    if (minutos === 45) return `un quarto alle ${(horas+1)%12 || 12}`;
                    return `${hora12} e ${minutos} minuti`;
                },
                'pt': () => {
                    if (minutos === 0) return `${hora12} em ponto`;
                    if (minutos === 15) return `${hora12} e quinze`;
                    if (minutos === 30) return `${hora12} e meia`;
                    if (minutos === 45) return `um quarto para as ${(horas+1)%12 || 12}`;
                    return `${hora12} e ${minutos} minutos`;
                }
            };
            return textos[idioma] ? textos[idioma]() : textos['es']();
        }
        
        function decirHora() {
            if (!activado) return;
            
            const texto = obtenerTextoHora();
            const ahora = new Date();
            
            console.log("🔊 Diciendo:", texto);
            
            const utterance = new SpeechSynthesisUtterance(texto);
            utterance.lang = idioma === 'es' ? 'es-ES' : 
                           idioma === 'en' ? 'en-US' :
                           idioma === 'fr' ? 'fr-FR' :
                           idioma === 'de' ? 'de-DE' :
                           idioma === 'it' ? 'it-IT' : 'pt-PT';
            utterance.rate = 0.9;
            
            estadoSpan.innerHTML = `🗣️ "${texto}" (${ahora.toLocaleTimeString()})`;
            
            utterance.onend = () => {
                setTimeout(() => {
                    estadoSpan.innerHTML = "🎤 Modo llamada activo - Próxima hora en 15 min";
                }, 2000);
            };
            
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }
        
        function probarVoz() {
            const prueba = new SpeechSynthesisUtterance(
                idioma === 'es' ? "Prueba de voz" :
                idioma === 'en' ? "Voice test" :
                idioma === 'fr' ? "Test de voix" :
                idioma === 'de' ? "Stimmentest" :
                idioma === 'it' ? "Prova vocale" : "Teste de voz"
            );
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(prueba);
        }
        
        // ============ RELOJ ============
        function actualizarReloj() {
            const ahora = new Date();
            horaSpan.innerHTML = ahora.toLocaleTimeString('es-ES', { hour12: false });
            
            if (!activado) return;
            
            const minutos = ahora.getMinutes();
            const segundos = ahora.getSeconds();
            const esCuarto = [0, 15, 30, 45].includes(minutos);
            
            if (esCuarto && segundos === 0 && minutos !== ultimoMinutoHablado) {
                console.log("⏰ Hablando:", minutos);
                decirHora();
                ultimoMinutoHablado = minutos;
            }
        }
        
        // ============ ACTIVAR TODO ============
        async function activar() {
            if (activado) {
                estadoSpan.innerHTML = "✅ Ya estaba activado";
                return;
            }
            
            estadoSpan.innerHTML = "🔄 Activando modo llamada...";
            
            // 1. Iniciar el modo llamada (captura micrófono silencioso)
            const exito = await iniciarModoLlamada();
            
            if (!exito) {
                estadoSpan.innerHTML = "❌ No se pudo activar. Permite el micrófono.";
                return;
            }
            
            // 2. Activar el reloj
            activado = true;
            estadoSpan.innerHTML = "✅ MODO LLAMADA ACTIVO - El reloj hablará con pantalla apagada";
            
            // 3. Decir la hora inmediatamente
            setTimeout(() => {
                decirHora();
            }, 500);
        }
        
        // ============ EVENTOS ============
        activarBtn.onclick = activar;
        probarBtn.onclick = probarVoz;
        
        idiomaSelect.onchange = (e) => {
            idioma = e.target.value;
            estadoSpan.innerHTML = `🌐 Idioma: ${idiomaSelect.options[idiomaSelect.selectedIndex].text}`;
        };
        
        // Precargar síntesis de voz
        if ('speechSynthesis' in window) {
            const silent = new SpeechSynthesisUtterance('');
            silent.volume = 0;
            window.speechSynthesis.speak(silent);
        }
        
        // Reloj visual
        setInterval(actualizarReloj, 1000);
        actualizarReloj();
        
        console.log("✅ Listo - Presiona 'INICIAR MODO LLAMADA'");
    </script>
</body>
</html>
