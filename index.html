<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Reloj NFC - Versión Definitiva</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0b3b3f, #1a2a3a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            touch-action: manipulation;
            cursor: pointer;
            overflow: hidden;
        }
        #welcomeScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #0f2027, #203a43);
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: opacity 0.8s ease;
        }
        .touch-indicator {
            animation: pulse 1.5s infinite;
            background: rgba(255,255,255,0.15);
            padding: 25px 40px;
            border-radius: 80px;
            margin-top: 30px;
            border: 2px solid rgba(255,255,255,0.3);
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; box-shadow: 0 0 0 0 rgba(0, 255, 255, 0.4);}
            70% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 0 20px rgba(0, 255, 255, 0);}
            100% { transform: scale(1); opacity: 0.6; box-shadow: 0 0 0 0 rgba(0, 255, 255, 0);}
        }
        .nfc-icon { font-size: 5rem; margin-bottom: 20px; }
        .welcome-title { font-size: 2rem; margin-bottom: 20px; text-shadow: 0 0 15px cyan; }
        .welcome-subtitle { font-size: 1.3rem; margin-bottom: 10px; }
        .small-note { margin-top: 60px; font-size: 0.8rem; opacity: 0.6; }
        .reloj {
            background: rgba(0,0,0,0.7);
            padding: 1.5rem;
            border-radius: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            max-width: 550px;
            width: 90%;
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.6s ease;
        }
        .reloj.visible { opacity: 1; transform: scale(1); }
        .hora {
            font-size: 3rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px #00ffcc;
            margin: 15px 0;
        }
        .estado {
            margin-top: 15px;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        .badge {
            background: #27ae60;
            color: black;
            padding: 4px 10px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 10px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .info { font-size: 0.7rem; margin-top: 10px; opacity: 0.8; }
        .fantasma { background: #8e44ad; margin-top: 10px; font-size: 0.65rem; }
        .selector-idioma { margin: 15px 0; padding: 10px; background: rgba(0,0,0,0.4); border-radius: 15px; }
        .selector-idioma select {
            background: rgba(0,0,0,0.7);
            color: white;
            border: 1px solid #667eea;
            padding: 8px 12px;
            border-radius: 25px;
            font-size: 0.8rem;
            width: 90%;
            cursor: pointer;
        }
        button {
            background: #667eea;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-top: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="welcomeScreen">
        <div class="nfc-icon">📱➡️🏷️</div>
        <div class="welcome-title">Reloj NFC</div>
        <div class="welcome-subtitle">🔓 TOQUE EN CUALQUIER LUGAR</div>
        <div class="touch-indicator">✨ TOCA LA PANTALLA ✨</div>
        <div class="small-note">(Dice la hora cada 15 minutos - Funciona con pantalla apagada)</div>
    </div>

    <div class="reloj" id="relojContainer">
        <div class="badge">🔓 ACTIVADO</div>
        <h1>🗣️ Reloj Parlante</h1>
        <div class="hora" id="horaPantalla">--:--:--</div>
        <div class="estado" id="estado">🎭 Esperando activación...</div>
        
        <div class="selector-idioma">
            <label>🌐 IDIOMA:</label>
            <select id="idiomaSelect">
                <option value="es">🇪🇸 Español</option>
                <option value="en">🇺🇸 English</option>
                <option value="fr">🇫🇷 Français</option>
                <option value="de">🇩🇪 Deutsch</option>
                <option value="it">🇮🇹 Italiano</option>
                <option value="pt">🇵🇹 Português</option>
            </select>
            <button id="btnProbar">🔊 Probar</button>
        </div>
        
        <div class="info">⏰ Dice la hora CADA 15 MINUTOS (00, 15, 30, 45)</div>
        <div class="info fantasma" id="fantasmaStatus">🔇 Manteniendo conexión...</div>
    </div>

    <script>
        // ========== VARIABLES ==========
        let activado = false;
        let ultimoCuartoHabla = -1;
        let keepAliveInterval = null;
        let audioContext = null;
        let osciladorFantasma = null;
        let gananciaFantasma = null;
        
        let idiomaActual = 'es';
        let velocidadVoz = 0.9;
        
        const welcomeDiv = document.getElementById('welcomeScreen');
        const relojDiv = document.getElementById('relojContainer');
        const horaPantalla = document.getElementById('horaPantalla');
        const estadoDiv = document.getElementById('estado');
        const fantasmaStatus = document.getElementById('fantasmaStatus');
        const idiomaSelect = document.getElementById('idiomaSelect');
        const btnProbar = document.getElementById('btnProbar');
        
        // ========== TEXTO HORA POR IDIOMA ==========
        function obtenerTextoHora() {
            const ahora = new Date();
            let horas = ahora.getHours();
            let minutos = ahora.getMinutes();
            let hora12 = horas % 12;
            if (hora12 === 0) hora12 = 12;
            
            const textos = {
                'es': () => {
                    if (minutos === 0) return `${hora12} en punto`;
                    if (minutos === 15) return `${hora12} y cuarto`;
                    if (minutos === 30) return `${hora12} y media`;
                    if (minutos === 45) {
                        let sig = (horas + 1) % 12;
                        if (sig === 0) sig = 12;
                        return `un cuarto para las ${sig}`;
                    }
                    return `${hora12} y ${minutos} minutos`;
                },
                'en': () => {
                    const ampm = horas < 12 ? 'AM' : 'PM';
                    if (minutos === 0) return `${hora12} o'clock ${ampm}`;
                    if (minutos === 15) return `quarter past ${hora12} ${ampm}`;
                    if (minutos === 30) return `half past ${hora12} ${ampm}`;
                    if (minutos === 45) {
                        let sig = (horas + 1) % 12;
                        if (sig === 0) sig = 12;
                        return `quarter to ${sig} ${ampm}`;
                    }
                    return `${hora12} ${minutos} ${ampm}`;
                },
                'fr': () => {
                    if (minutos === 0) return `${hora12} heures`;
                    if (minutos === 15) return `${hora12} heures et quart`;
                    if (minutos === 30) return `${hora12} heures et demie`;
                    if (minutos === 45) {
                        let sig = (horas + 1) % 12;
                        if (sig === 0) sig = 12;
                        return `moins le quart ${sig} heures`;
                    }
                    return `${hora12} heures ${minutos}`;
                },
                'de': () => {
                    if (minutos === 0) return `${hora12} Uhr`;
                    if (minutos === 15) return `Viertel nach ${hora12}`;
                    if (minutos === 30) return `halb ${hora12 + 1}`;
                    if (minutos === 45) {
                        let sig = (horas + 1) % 12;
                        if (sig === 0) sig = 12;
                        return `Viertel vor ${sig}`;
                    }
                    return `${hora12} Uhr ${minutos}`;
                },
                'it': () => {
                    if (minutos === 0) return `${hora12} in punto`;
                    if (minutos === 15) return `${hora12} e un quarto`;
                    if (minutos === 30) return `${hora12} e mezza`;
                    if (minutos === 45) {
                        let sig = (horas + 1) % 12;
                        if (sig === 0) sig = 12;
                        return `un quarto alle ${sig}`;
                    }
                    return `${hora12} e ${minutos} minuti`;
                },
                'pt': () => {
                    if (minutos === 0) return `${hora12} em ponto`;
                    if (minutos === 15) return `${hora12} e quinze`;
                    if (minutos === 30) return `${hora12} e meia`;
                    if (minutos === 45) {
                        let sig = (horas + 1) % 12;
                        if (sig === 0) sig = 12;
                        return `um quarto para as ${sig}`;
                    }
                    return `${hora12} e ${minutos} minutos`;
                }
            };
            return textos[idiomaActual] ? textos[idiomaActual]() : textos['es']();
        }
        
        // ========== VOZ ==========
        function obtenerVozPorIdioma() {
            const voces = window.speechSynthesis.getVoices();
            const langMap = {'es':'es','en':'en','fr':'fr','de':'de','it':'it','pt':'pt'};
            return voces.find(v => v.lang.startsWith(langMap[idiomaActual])) || null;
        }
        
        function decirHora() {
            if (!activado) return;
            const texto = obtenerTextoHora();
            const voz = obtenerVozPorIdioma();
            
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(texto);
            utterance.rate = velocidadVoz;
            if (voz) {
                utterance.voice = voz;
                utterance.lang = voz.lang;
            }
            
            estadoDiv.innerText = `🗣️ "${texto}"`;
            utterance.onend = () => setTimeout(() => {
                if (estadoDiv.innerText.includes(texto)) estadoDiv.innerText = "✅ Próxima hora en 15 min";
            }, 2000);
            window.speechSynthesis.speak(utterance);
        }
        
        function probarVoz() {
            if (!activado) {
                estadoDiv.innerText = "🔇 Activa el reloj tocando la pantalla";
                return;
            }
            const mensajes = {
                'es': "Prueba de voz en español",
                'en': "Voice test in English",
                'fr': "Test de voix en français",
                'de': "Stimmentest auf Deutsch",
                'it': "Prova vocale in italiano",
                'pt': "Teste de voz em português"
            };
            const utterance = new SpeechSynthesisUtterance(mensajes[idiomaActual]);
            utterance.rate = velocidadVoz;
            const voz = obtenerVozPorIdioma();
            if (voz) utterance.voice = voz;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }
        
        // ========== SONIDO FANTASMA (TONO MUY GRAVE - MANTIENE EL PROCESO VIVO) ==========
        function iniciarSonidoFantasma() {
            if (!activado) return;
            
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // Crear oscilador de muy baja frecuencia (20 Hz - casi inaudible)
                osciladorFantasma = audioContext.createOscillator();
                gananciaFantasma = audioContext.createGain();
                
                osciladorFantasma.type = 'sine';
                osciladorFantasma.frequency.value = 20; // 20 Hz (muy grave, casi no se oye)
                gananciaFantasma.gain.value = 0.05; // Volumen muy bajo
                
                osciladorFantasma.connect(gananciaFantasma);
                gananciaFantasma.connect(audioContext.destination);
                
                osciladorFantasma.start();
                
                // Reanudar contexto si está suspendido
                if (audioContext.state === 'suspended') {
                    audioContext.resume();
                }
                
                fantasmaStatus.innerHTML = "👻 MODO FANTASMA ACTIVO ✅ (pantalla puede apagarse)";
                fantasmaStatus.style.background = "#27ae60";
                console.log("✅ Sonido fantasma (20Hz) activado");
                
            } catch (error) {
                console.error("Error:", error);
                fantasmaStatus.innerHTML = "⚠️ Usando modo keep-alive alternativo";
                fantasmaStatus.style.background = "#e67e22";
            }
        }
        
        // ========== KEEP ALIVE CON WEB WORKER ==========
        function iniciarKeepAlive() {
            // Intervalo que fuerza actividad cada 5 segundos
            keepAliveInterval = setInterval(() => {
                if (!activado) return;
                
                // Mantener el AudioContext vivo
                if (audioContext && audioContext.state === 'suspended') {
                    audioContext.resume();
                }
                
                // Pequeña acción que mantiene el hilo principal activo
                const ahora = new Date();
                const segundos = ahora.getSeconds();
                if (segundos % 10 === 0) {
                    console.log("💓 Keep-alive pulse");
                }
            }, 5000);
        }
        
        // ========== ACTIVAR ==========
        function activarConTacto() {
            if (activado) return;
            
            activado = true;
            
            // Animación
            welcomeDiv.style.opacity = '0';
            setTimeout(() => {
                welcomeDiv.style.display = 'none';
                relojDiv.classList.add('visible');
            }, 800);
            
            // Iniciar todo
            setTimeout(() => {
                iniciarSonidoFantasma();
                iniciarKeepAlive();
                estadoDiv.innerText = "🎉 ACTIVADO - Reloj funcionando";
            }, 500);
            
            setTimeout(() => {
                decirHora();
            }, 1500);
        }
        
        // ========== RELOJ ==========
        function formatearHora(date) {
            return date.toLocaleTimeString('es-ES', { hour12: false });
        }
        
        function actualizarRelojYHablar() {
            const ahora = new Date();
            horaPantalla.innerText = formatearHora(ahora);
            
            if (!activado) return;
            
            const minutos = ahora.getMinutes();
            const segundos = ahora.getSeconds();
            const esCuarto = [0, 15, 30, 45].includes(minutos);
            
            if (esCuarto && segundos === 0 && minutos !== ultimoCuartoHabla) {
                decirHora();
                ultimoCuartoHabla = minutos;
                
                // Reactivar audio si es necesario
                if (audioContext && audioContext.state === 'suspended') {
                    audioContext.resume();
                }
            }
        }
        
        // ========== EVENTOS ==========
        welcomeDiv.addEventListener('click', activarConTacto);
        welcomeDiv.addEventListener('touchstart', activarConTacto);
        
        idiomaSelect.addEventListener('change', (e) => {
            idiomaActual = e.target.value;
            estadoDiv.innerText = `🌐 Idioma cambiado`;
            setTimeout(() => {
                if (estadoDiv.innerText.includes("cambiado")) estadoDiv.innerText = "✅ Reloj activo";
            }, 2000);
        });
        
        btnProbar.addEventListener('click', probarVoz);
        
        // Pre-cargar SpeechSynthesis
        if ('speechSynthesis' in window) {
            const silent = new SpeechSynthesisUtterance('');
            silent.volume = 0;
            window.speechSynthesis.speak(silent);
        }
        
        // Iniciar reloj visual
        setInterval(actualizarRelojYHablar, 1000);
        actualizarRelojYHablar();
        
        // Detectar cuando la página se oculta (pantalla apagada)
        document.addEventListener('visibilitychange', () => {
            if (!activado) return;
            if (document.hidden) {
                console.log("📱 Pantalla apagada - Manteniendo procesos");
                // Asegurar que el audio sigue vivo
                if (audioContext && audioContext.state === 'suspended') {
                    audioContext.resume();
                }
            }
        });
        
        console.log("✅ Reloj listo - Usando tono de 20Hz para mantener vivo");
    </script>
</body>
</html>
