<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Reloj NFC - Voz Forzada</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0b3b3f, #1a2a3a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .reloj {
            background: rgba(0,0,0,0.7);
            padding: 2rem;
            border-radius: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
        }
        .hora {
            font-size: 4rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px #00ffcc;
            margin: 20px 0;
        }
        .estado {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 15px;
            margin: 15px 0;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .badge {
            background: #27ae60;
            color: black;
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 10px;
            font-size: 0.75rem;
            font-weight: bold;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        button {
            background: #e67e22;
            border: none;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            margin: 10px 5px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:active {
            transform: scale(0.95);
        }
        .btn-test {
            background: #2ecc71;
        }
        .info {
            font-size: 0.7rem;
            margin-top: 15px;
            opacity: 0.8;
        }
        .alerta {
            background: #e74c3c;
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="reloj">
        <div class="badge">🔊 RELOJ NFC - MODO VOZ</div>
        <h1>🗣️ Reloj que habla</h1>
        <div class="hora" id="horaPantalla">--:--:--</div>
        <div class="estado" id="estado">⚠️ Presiona "ACTIVAR VOZ" para comenzar</div>
        
        <button id="btnActivar" class="btn-test">🔊 ACTIVAR VOZ AHORA</button>
        <button id="btnTest">🎤 PROBAR ANUNCIO</button>
        
        <div class="info">
            ⏰ Anuncia cada 15 minutos (en punto, y cuarto, y media, menos cuarto)<br>
            📱 Funciona con pantalla apagada en Android<br>
            🔑 PRIMERO: Presiona "ACTIVAR VOZ"
        </div>
    </div>

    <script>
        let vozActivada = false;
        let ultimoMinutoAnunciado = -1;
        let relojInterval = null;
        let audioActivado = false;
        
        const horaPantalla = document.getElementById('horaPantalla');
        const estadoDiv = document.getElementById('estado');
        const btnActivar = document.getElementById('btnActivar');
        const btnTest = document.getElementById('btnTest');
        
        // Formatear hora para pantalla
        function formatearHora(date) {
            return date.toLocaleTimeString('es-ES', { hour12: false });
        }
        
        // Texto natural para anunciar
        function obtenerTextoHora() {
            const ahora = new Date();
            let horas = ahora.getHours();
            let minutos = ahora.getMinutes();
            let hora12 = horas % 12;
            if (hora12 === 0) hora12 = 12;
            
            if (minutos === 0) return `${hora12} en punto`;
            if (minutos === 15) return `${hora12} y cuarto`;
            if (minutos === 30) return `${hora12} y media`;
            if (minutos === 45) {
                let sig = (horas + 1) % 12;
                if (sig === 0) sig = 12;
                return `un cuarto para las ${sig}`;
            }
            return null; // Solo anunciamos cuartos
        }
        
        // Reproducir un "ding" corto para activar el canal de audio
        function playDing() {
            if (!audioActivado) return;
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                oscillator.connect(gain);
                gain.connect(audioCtx.destination);
                oscillator.frequency.value = 880;
                gain.gain.value = 0.1;
                oscillator.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
                oscillator.stop(audioCtx.currentTime + 0.5);
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            } catch(e) {
                console.log('Ding no soportado');
            }
        }
        
        // Función principal para anunciar con reintentos
        function anunciarHora(intento = 1) {
            const texto = obtenerTextoHora();
            if (!texto) return false;
            
            const ahora = new Date();
            const minActual = ahora.getMinutes();
            
            // Evitar anuncios duplicados en el mismo minuto
            if (ultimoMinutoAnunciado === minActual) return false;
            
            console.log(`🗣️ Anunciando: "${texto}" (intento ${intento})`);
            estadoDiv.innerHTML = `🔊 Anunciando: "${texto}"...`;
            
            if (!('speechSynthesis' in window)) {
                estadoDiv.innerHTML = '❌ Navegador no soporta voz';
                return false;
            }
            
            // Pequeño ding antes del anuncio (ayuda a despertar audio)
            playDing();
            
            setTimeout(() => {
                const utterance = new SpeechSynthesisUtterance(texto);
                utterance.lang = 'es-ES';
                utterance.rate = 0.9;
                utterance.volume = 1;
                
                utterance.onend = () => {
                    console.log('✅ Anuncio completado');
                    estadoDiv.innerHTML = `✅ Próximo anuncio en 15 minutos`;
                    ultimoMinutoAnunciado = minActual;
                };
                
                utterance.onerror = (e) => {
                    console.error('❌ Error en voz:', e);
                    if (intento < 3) {
                        estadoDiv.innerHTML = `⚠️ Reintentando (${intento}/3)...`;
                        setTimeout(() => anunciarHora(intento + 1), 500);
                    } else {
                        estadoDiv.innerHTML = '❌ Error de voz. Presiona "ACTIVAR VOZ" nuevamente.';
                    }
                };
                
                // Importante: cancelar voces previas
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utterance);
            }, 100);
            
            return true;
        }
        
        // Probar anuncio manual
        function probarAnuncio() {
            if (!vozActivada) {
                estadoDiv.innerHTML = '⚠️ Primero presiona "ACTIVAR VOZ"';
                return;
            }
            anunciarHora();
        }
        
        // Activar voz (requiere interacción del usuario)
        function activarVoz() {
            console.log('🎤 Activando sistema de voz...');
            
            // 1. Forzar AudioContext
            try {
                const testAudio = new (window.AudioContext || window.webkitAudioContext)();
                testAudio.resume();
                audioActivado = true;
                console.log('✅ AudioContext activado');
            } catch(e) {
                console.log('AudioContext no disponible');
            }
            
            // 2. Enviar un utterance silencioso para "despertar" speechSynthesis
            const silent = new SpeechSynthesisUtterance('');
            silent.volume = 0;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(silent);
            
            // 3. Pequeño anuncio de prueba
            setTimeout(() => {
                const prueba = new SpeechSynthesisUtterance('Voz activada');
                prueba.lang = 'es-ES';
                prueba.volume = 1;
                window.speechSynthesis.speak(prueba);
                vozActivada = true;
                estadoDiv.innerHTML = '✅ VOZ ACTIVADA - Esperando cuarto de hora';
                console.log('🎤 Sistema de voz listo');
            }, 200);
        }
        
        // Actualizar reloj y verificar cuartos
        function actualizarReloj() {
            const ahora = new Date();
            horaPantalla.innerHTML = formatearHora(ahora);
            
            const minutos = ahora.getMinutes();
            const segundos = ahora.getSeconds();
            const esCuarto = [0, 15, 30, 45].includes(minutos);
            
            // Anunciar exactamente en el segundo 0 del cuarto de hora
            if (vozActivada && esCuarto && segundos === 0) {
                anunciarHora();
            }
        }
        
        // Iniciar el reloj (siempre corre, aunque voz no esté activada)
        function iniciarReloj() {
            if (relojInterval) clearInterval(relojInterval);
            relojInterval = setInterval(actualizarReloj, 1000);
            actualizarReloj();
            estadoDiv.innerHTML = '⚠️ Presiona "ACTIVAR VOZ" para comenzar los anuncios';
        }
        
        // Eventos de botones
        btnActivar.addEventListener('click', () => {
            activarVoz();
        });
        
        btnTest.addEventListener('click', () => {
            if (!vozActivada) {
                estadoDiv.innerHTML = '⚠️ Primero activa la voz con el botón verde';
                return;
            }
            probarAnuncio();
        });
        
        // Iniciar todo
        iniciarReloj();
        
        // Mostrar instrucciones si está en móvil
        if (/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
            console.log('📱 Dispositivo móvil detectado - La voz requiere toque manual');
        }
    </script>
</body>
</html>
