<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reloj - Modo Fantasma</title>
    <style>
        body {
            background: linear-gradient(135deg, #0b3b3f, #1a2a3a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: rgba(0,0,0,0.7);
            padding: 2rem;
            border-radius: 2rem;
            max-width: 500px;
        }
        .hora {
            font-size: 4rem;
            font-family: monospace;
            text-shadow: 0 0 10px #00ffcc;
            margin: 20px 0;
        }
        button {
            background: #2ecc71;
            border: none;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            margin: 10px;
            cursor: pointer;
        }
        .estado {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 15px;
            margin: 15px 0;
            font-size: 0.9rem;
        }
        .debug {
            font-size: 0.7rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔊 RELOJ - MODO FANTASMA</h1>
        <div class="hora" id="hora">--:--:--</div>
        <div class="estado" id="estado">⚡ Inactivo</div>
        <button id="btnActivar">🔮 ACTIVAR MODO FANTASMA</button>
        <button id="btnProbar">🔊 PROBAR</button>
        <div class="debug" id="debug"></div>
        <p>✅ Al activar, el audio seguirá sonando aunque apagues la pantalla</p>
    </div>

    <script>
        let modoFantasmaActivo = false;
        let audioCtx = null;
        let intervaloPersistente = null;
        let fantasmaOsc = null;
        
        const horaElem = document.getElementById('hora');
        const estadoElem = document.getElementById('estado');
        const debugElem = document.getElementById('debug');
        
        // Actualizar hora en pantalla
        setInterval(() => {
            const ahora = new Date();
            horaElem.innerHTML = ahora.toLocaleTimeString('es-ES');
        }, 1000);
        
        // Texto para hablar
        function getTextoHora() {
            const ahora = new Date();
            let h = ahora.getHours();
            let m = ahora.getMinutes();
            let h12 = h % 12;
            if (h12 === 0) h12 = 12;
            
            if (m === 0) return `${h12} en punto`;
            if (m === 15) return `${h12} y cuarto`;
            if (m === 30) return `${h12} y media`;
            if (m === 45) {
                let sig = (h + 1) % 12;
                if (sig === 0) sig = 12;
                return `un cuarto para las ${sig}`;
            }
            return null;
        }
        
        // Reproducir sonido (beep)
        function beep(freq = 880, duration = 0.2) {
            if (!audioCtx || !modoFantasmaActivo) return;
            
            try {
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = freq;
                gain.gain.value = 0.3;
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                osc.stop(audioCtx.currentTime + duration);
                
                debugElem.innerHTML = `🔊 Beep ${freq}Hz`;
            } catch(e) {
                debugElem.innerHTML = `Error beep: ${e.message}`;
            }
        }
        
        // Hablar
        function hablar(texto) {
            if (!modoFantasmaActivo) return;
            
            debugElem.innerHTML = `🗣️ Hablando: "${texto}"`;
            
            // Beep antes de hablar (despierta el canal)
            beep(660, 0.1);
            
            setTimeout(() => {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(texto);
                utterance.lang = 'es-ES';
                utterance.rate = 0.9;
                utterance.volume = 1;
                window.speechSynthesis.speak(utterance);
                estadoElem.innerHTML = `🔊 "${texto}"`;
            }, 150);
        }
        
        // ============================================
        // TRUCO CLAVE: MODO FANTASMA
        // ============================================
        function activarModoFantasma() {
            debugElem.innerHTML = '🎭 Activando modo fantasma...';
            
            // 1. Crear AudioContext
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioCtx();
            
            // 2. TRUCO PRINCIPAL: Oscilador silencioso INFINITO
            // Esto evita que el navegador suspenda el contexto
            fantasmaOsc = audioCtx.createOscillator();
            const fantasmaGain = audioCtx.createGain();
            fantasmaGain.gain.value = 0; // SILENCIO TOTAL
            fantasmaOsc.connect(fantasmaGain);
            fantasmaGain.connect(audioCtx.destination);
            fantasmaOsc.start();
            
            // 3. ScriptProcessor silencioso (legacy pero efectivo)
            try {
                const bufferSize = 4096;
                const scriptNode = audioCtx.createScriptProcessor(bufferSize, 1, 1);
                scriptNode.onaudioprocess = function(e) {
                    // NO HACER NADA - solo mantener vivo el hilo
                    if (!modoFantasmaActivo) return;
                };
                scriptNode.connect(fantasmaGain);
            } catch(e) {
                debugElem.innerHTML += ' (sin ScriptProcessor)';
            }
            
            // 4. Reanudar contexto
            audioCtx.resume();
            
            // 5. Iniciar verificación de cuartos
            iniciarVerificadorDeCuartos();
            
            modoFantasmaActivo = true;
            
            // Confirmación
            setTimeout(() => {
                beep(880, 0.15);
                setTimeout(() => {
                    beep(880, 0.15);
                    setTimeout(() => {
                        hablar("Modo fantasma activado");
                        estadoElem.innerHTML = '✅ MODO FANTASMA ACTIVO - Funciona con pantalla apagada';
                        estadoElem.style.background = 'rgba(46,204,113,0.3)';
                    }, 200);
                }, 200);
            }, 200);
        }
        
        // Verificador de cuartos (usa setTimeout, NO setInterval)
        function iniciarVerificadorDeCuartos() {
            if (intervaloPersistente) clearTimeout(intervaloPersistente);
            
            const ahora = new Date();
            const minutos = ahora.getMinutes();
            const segundos = ahora.getSeconds();
            
            let minutosFaltantes;
            if (minutos < 15) minutosFaltantes = 15 - minutos;
            else if (minutos < 30) minutosFaltantes = 30 - minutos;
            else if (minutos < 45) minutosFaltantes = 45 - minutos;
            else minutosFaltantes = 60 - minutos;
            
            if (minutosFaltantes === 0 && segundos > 0) {
                minutosFaltantes = 15;
            }
            
            const msFaltantes = (minutosFaltantes * 60 - segundos) * 1000;
            
            debugElem.innerHTML = `⏰ Próximo en ${minutosFaltantes}min ${Math.floor(msFaltantes/1000)%60}s`;
            estadoElem.innerHTML = `⏰ Próximo anuncio en ${minutosFaltantes} minutos`;
            
            intervaloPersistente = setTimeout(() => {
                const texto = getTextoHora();
                if (texto) {
                    beep(880, 0.25);
                    setTimeout(() => hablar(texto), 200);
                }
                iniciarVerificadorDeCuartos(); // Reprogramar
            }, msFaltantes);
        }
        
        // Probar
        function probar() {
            if (!modoFantasmaActivo) {
                estadoElem.innerHTML = '⚠️ Primero activa el modo fantasma';
                return;
            }
            
            const texto = getTextoHora();
            if (texto) {
                beep(880, 0.2);
                setTimeout(() => hablar(texto), 150);
            } else {
                const ahora = new Date();
                beep(660, 0.2);
                setTimeout(() => hablar(`Son las ${ahora.toLocaleTimeString()}`), 150);
            }
        }
        
        // Eventos
        document.getElementById('btnActivar').onclick = () => {
            activarModoFantasma();
        };
        
        document.getElementById('btnProbar').onclick = () => {
            probar();
        };
        
        console.log('🚀 Página lista - Modo fantasma activable');
    </script>
</body>
</html>
