<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Reloj NFC - Contador Siempre Activo</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0b3b3f, #1a2a3a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .reloj {
            background: rgba(0,0,0,0.7);
            padding: 2rem;
            border-radius: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
        }
        .hora {
            font-size: 4rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px #00ffcc;
            margin: 20px 0;
        }
        .estado {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 15px;
            margin: 15px 0;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .badge {
            background: #27ae60;
            color: black;
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 10px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        button {
            background: #e67e22;
            border: none;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            margin: 10px 5px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:active {
            transform: scale(0.95);
        }
        .btn-test {
            background: #2ecc71;
        }
        .info {
            font-size: 0.7rem;
            margin-top: 15px;
            opacity: 0.8;
        }
        .contador-vivo {
            background: #27ae60;
            padding: 5px;
            border-radius: 10px;
            font-size: 0.8rem;
            margin-top: 10px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="reloj">
        <div class="badge">🔊 RELOJ NFC - MODO ININTERRUMPIDO</div>
        <h1>🗣️ Reloj que habla</h1>
        <div class="hora" id="horaPantalla">--:--:--</div>
        <div class="estado" id="estado">⚠️ Presiona "ACTIVAR VOZ"</div>
        <div class="contador-vivo" id="contadorVivo">🟢 Contador activo: 0 latidos</div>
        
        <button id="btnActivar" class="btn-test">🔊 ACTIVAR VOZ</button>
        <button id="btnTest">🎤 PROBAR</button>
        
        <div class="info">
            ⏰ Anuncia cada 15 minutos<br>
            🔋 El contador NO se para aunque la pantalla se apague<br>
            📱 Compatible con Android y iOS (limitado)<br>
            ✅ PRIMERO: Presiona "ACTIVAR VOZ"
        </div>
    </div>

    <script>
        // ============================================
        // SISTEMA DE KEEP-ALIVE CON WEB WORKER
        // ============================================
        
        let vozActivada = false;
        let ultimoMinutoAnunciado = -1;
        let latidos = 0;
        
        const horaPantalla = document.getElementById('horaPantalla');
        const estadoDiv = document.getElementById('estado');
        const contadorVivoDiv = document.getElementById('contadorVivo');
        const btnActivar = document.getElementById('btnActivar');
        const btnTest = document.getElementById('btnTest');
        
        // === 1. CREAR WEB WORKER PARA MANTENER EL CONTADOR VIVO ===
        function crearWorkerKeepAlive() {
            // Worker que corre en segundo plano, incluso con pantalla apagada
            const workerCode = `
                let intervaloWorker = null;
                let contadorWorker = 0;
                
                // Función que mantiene el tiempo aunque la pantalla esté apagada
                function iniciarWorker() {
                    if (intervaloWorker) clearInterval(intervaloWorker);
                    
                    // Usar setInterval DENTRO del worker - esto NO se pausa al apagar pantalla
                    intervaloWorker = setInterval(() => {
                        contadorWorker++;
                        // Enviar mensaje al hilo principal cada segundo
                        self.postMessage({
                            tipo: 'tick',
                            timestamp: Date.now(),
                            latido: contadorWorker
                        });
                    }, 1000);
                }
                
                // Escuchar mensajes del hilo principal
                self.onmessage = function(e) {
                    if (e.data === 'iniciar') {
                        iniciarWorker();
                    } else if (e.data === 'detener') {
                        if (intervaloWorker) clearInterval(intervaloWorker);
                    }
                };
                
                // Iniciar automáticamente
                iniciarWorker();
            `;
            
            const blob = new Blob([workerCode], { type: 'application/javascript' });
            const worker = new Worker(URL.createObjectURL(blob));
            
            worker.onmessage = function(e) {
                if (e.data.tipo === 'tick') {
                    // El worker sigue vivo aunque la pantalla esté apagada
                    latidos++;
                    contadorVivoDiv.innerHTML = `🟢 Contador activo: ${latidos} latidos - SEGUNDO ${new Date().getSeconds()}`;
                    
                    // Actualizar la hora en pantalla usando el timestamp del worker
                    const ahora = new Date(e.data.timestamp);
                    actualizarPantalla(ahora);
                    
                    // Verificar si es cuarto de hora
                    const minutos = ahora.getMinutes();
                    const segundos = ahora.getSeconds();
                    const esCuarto = [0, 15, 30, 45].includes(minutos);
                    
                    if (vozActivada && esCuarto && segundos === 0 && minutos !== ultimoMinutoAnunciado) {
                        anunciarHora(ahora);
                        ultimoMinutoAnunciado = minutos;
                    }
                }
            };
            
            // Iniciar el worker
            worker.postMessage('iniciar');
            
            return worker;
        }
        
        // === 2. ACTUALIZAR PANTALLA (desde el worker) ===
        function actualizarPantalla(fecha) {
            const horaStr = fecha.toLocaleTimeString('es-ES', { hour12: false });
            horaPantalla.innerHTML = horaStr;
        }
        
        // === 3. SISTEMA DE VOZ MEJORADO ===
        function obtenerTextoHora(fecha) {
            let horas = fecha.getHours();
            let minutos = fecha.getMinutes();
            let hora12 = horas % 12;
            if (hora12 === 0) hora12 = 12;
            
            if (minutos === 0) return `${hora12} en punto`;
            if (minutos === 15) return `${hora12} y cuarto`;
            if (minutos === 30) return `${hora12} y media`;
            if (minutos === 45) {
                let sig = (horas + 1) % 12;
                if (sig === 0) sig = 12;
                return `un cuarto para las ${sig}`;
            }
            return null;
        }
        
        function anunciarHora(fecha) {
            const texto = obtenerTextoHora(fecha);
            if (!texto) return;
            
            console.log(`🗣️ Anunciando: "${texto}" - ${fecha.toLocaleTimeString()}`);
            estadoDiv.innerHTML = `🔊 "${texto}"`;
            
            if (!('speechSynthesis' in window)) {
                estadoDiv.innerHTML = '❌ Voz no soportada';
                return;
            }
            
            // Cancela y reproduce
            window.speechSynthesis.cancel();
            
            setTimeout(() => {
                const utterance = new SpeechSynthesisUtterance(texto);
                utterance.lang = 'es-ES';
                utterance.rate = 0.9;
                utterance.volume = 1;
                
                utterance.onend = () => {
                    estadoDiv.innerHTML = '✅ Próximo anuncio en 15 minutos';
                };
                
                utterance.onerror = (e) => {
                    console.error('Error voz:', e);
                    estadoDiv.innerHTML = '⚠️ Error en voz, reintentando...';
                    setTimeout(() => {
                        if (vozActivada) window.speechSynthesis.speak(utterance);
                    }, 500);
                };
                
                window.speechSynthesis.speak(utterance);
            }, 100);
        }
        
        // === 4. ACTIVAR VOZ (requiere interacción) ===
        function activarVoz() {
            console.log('🎤 Activando voz...');
            
            // Forzar AudioContext
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                audioCtx.resume();
            } catch(e) {}
            
            // Inicializar speechSynthesis con un sonido silencioso
            const silent = new SpeechSynthesisUtterance('');
            silent.volume = 0;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(silent);
            
            // Anuncio de confirmación
            setTimeout(() => {
                const confirmacion = new SpeechSynthesisUtterance('Voz activada');
                confirmacion.lang = 'es-ES';
                window.speechSynthesis.speak(confirmacion);
                vozActivada = true;
                estadoDiv.innerHTML = '✅ VOZ ACTIVADA - Esperando cuarto de hora';
            }, 200);
        }
        
        function probarVoz() {
            if (!vozActivada) {
                estadoDiv.innerHTML = '⚠️ Primero activa la voz';
                return;
            }
            anunciarHora(new Date());
        }
        
        // === 5. INICIALIZACIÓN ===
        let worker = null;
        
        function iniciar() {
            // Iniciar el Web Worker (mantiene el contador vivo)
            worker = crearWorkerKeepAlive();
            estadoDiv.innerHTML = '⚠️ Presiona "ACTIVAR VOZ" para comenzar';
            
            // También mantener un setInterval local como respaldo
            setInterval(() => {
                // Esto es respaldo, el worker es el principal
                const ahora = new Date();
                if (!document.hidden) {
                    actualizarPantalla(ahora);
                }
            }, 1000);
        }
        
        // Eventos de botones
        btnActivar.addEventListener('click', () => {
            activarVoz();
        });
        
        btnTest.addEventListener('click', () => {
            probarVoz();
        });
        
        // Iniciar todo
        iniciar();
        
        // Mostrar info en consola
        console.log('🚀 Reloj iniciado - El contador NO se detiene con pantalla apagada');
        console.log('📱 Prueba: Bloquea la pantalla y observa que los latidos siguen aumentando');
    </script>
</body>
</html>
