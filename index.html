<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Reloj NFC - Con doble voz</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0b3b3f, #1a2a3a);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .reloj {
            background: rgba(0,0,0,0.7);
            padding: 2rem;
            border-radius: 2rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .hora {
            font-size: 4rem;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px #00ffcc;
            margin: 20px 0;
        }
        .estado {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 15px;
            margin: 10px 0;
            font-size: 0.9rem;
        }
        button {
            background: #2ed573;
            border: none;
            color: black;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            margin: 10px;
            cursor: pointer;
        }
        .badge {
            background: #f39c12;
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        select {
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px;
            border-radius: 20px;
            margin: 10px;
        }
        .info {
            font-size: 0.7rem;
            margin-top: 15px;
            opacity: 0.7;
        }
        .debug {
            font-size: 0.6rem;
            margin-top: 10px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="reloj">
        <div class="badge">🔊 MODO DOBLE VOZ</div>
        <h1>🗣️ Reloj Parlante</h1>
        <div class="hora" id="horaPantalla">--:--:--</div>
        
        <select id="idiomaSelect">
            <option value="es">🇪🇸 Español</option>
            <option value="en">🇺🇸 English</option>
            <option value="fr">🇫🇷 Français</option>
            <option value="de">🇩🇪 Deutsch</option>
            <option value="it">🇮🇹 Italiano</option>
            <option value="pt">🇵🇹 Português</option>
        </select>
        
        <button id="activarBtn">🎤 ACTIVAR RELOJ</button>
        <button id="probarBtn">🔊 PROBAR VOZ</button>
        
        <div class="estado" id="estado">⚡ Presiona "ACTIVAR RELOJ"</div>
        <div class="debug" id="debugInfo"></div>
        <div class="info">🔊 Dice la hora DOS VECES seguidas para asegurar que se escuche</div>
    </div>

    <script>
        // ============ VARIABLES ============
        let activado = false;
        let idioma = 'es';
        let ultimoMinutoHablado = -1;
        
        // ============ RECURSOS PARA MANTENER VIVO ============
        let streamMic = null;
        let audioCtxUltra = null;
        let ultraInterval = null;
        let osciladorUltra = null;
        let pingCount = 0;
        
        // Elementos
        const horaSpan = document.getElementById('horaPantalla');
        const estadoSpan = document.getElementById('estado');
        const debugSpan = document.getElementById('debugInfo');
        const activarBtn = document.getElementById('activarBtn');
        const probarBtn = document.getElementById('probarBtn');
        const idiomaSelect = document.getElementById('idiomaSelect');
        
        // ============ MICRÓFONO SILENCIOSO (como walkie) ============
        async function iniciarMicrofonoSilencioso() {
            try {
                console.log("🎤 Solicitando micrófono...");
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                streamMic = stream;
                console.log("✅ Micrófono activo");
                return true;
            } catch(e) {
                console.error("❌ Error:", e);
                return false;
            }
        }
        
        // ============ ULTRASONIDO 19kHz ============
        async function iniciarUltrasonido() {
            try {
                if (audioCtxUltra) {
                    try { await audioCtxUltra.close(); } catch(e) {}
                }
                
                audioCtxUltra = new (window.AudioContext || window.webkitAudioContext)();
                
                if (audioCtxUltra.state === 'suspended') {
                    await audioCtxUltra.resume();
                }
                
                osciladorUltra = audioCtxUltra.createOscillator();
                const gain = audioCtxUltra.createGain();
                
                osciladorUltra.type = 'sine';
                osciladorUltra.frequency.value = 19000;
                gain.gain.value = 0.0001;
                
                osciladorUltra.connect(gain);
                gain.connect(audioCtxUltra.destination);
                osciladorUltra.start();
                
                ultraInterval = setInterval(() => {
                    if (audioCtxUltra && activado) {
                        try {
                            if (audioCtxUltra.state === 'suspended') {
                                audioCtxUltra.resume();
                            }
                            
                            const beep = audioCtxUltra.createOscillator();
                            const beepGain = audioCtxUltra.createGain();
                            beep.type = 'sine';
                            beep.frequency.value = 18000;
                            beepGain.gain.value = 0.0002;
                            beep.connect(beepGain);
                            beepGain.connect(audioCtxUltra.destination);
                            beep.start();
                            beep.stop(audioCtxUltra.currentTime + 0.03);
                            
                            pingCount++;
                            debugSpan.innerHTML = `🔊 Ping #${pingCount} - ${new Date().toLocaleTimeString()}`;
                        } catch(e) {}
                    }
                }, 8000);
                
                console.log("✅ Ultrasonido activo");
                return true;
            } catch(e) {
                console.error("❌ Error ultrasonido:", e);
                return false;
            }
        }
        
        // ============ FUNCIÓN CLAVE: DECIR LA HORA DOS VECES ============
        function obtenerTextoHora() {
            const ahora = new Date();
            let horas = ahora.getHours();
            let minutos = ahora.getMinutes();
            let hora12 = horas % 12;
            if (hora12 === 0) hora12 = 12;
            
            const textos = {
                'es': () => {
                    if (minutos === 0) return `${hora12} en punto`;
                    if (minutos === 15) return `${hora12} y cuarto`;
                    if (minutos === 30) return `${hora12} y media`;
                    if (minutos === 45) return `un cuarto para las ${(horas+1)%12 || 12}`;
                    return `${hora12} y ${minutos} minutos`;
                },
                'en': () => {
                    const ampm = horas < 12 ? 'AM' : 'PM';
                    if (minutos === 0) return `${hora12} o'clock ${ampm}`;
                    if (minutos === 15) return `quarter past ${hora12} ${ampm}`;
                    if (minutos === 30) return `half past ${hora12} ${ampm}`;
                    if (minutos === 45) return `quarter to ${(horas+1)%12 || 12} ${ampm}`;
                    return `${hora12} ${minutos} ${ampm}`;
                },
                'fr': () => {
                    if (minutos === 0) return `${hora12} heures`;
                    if (minutos === 15) return `${hora12} heures et quart`;
                    if (minutos === 30) return `${hora12} heures et demie`;
                    if (minutos === 45) return `moins le quart ${(horas+1)%12 || 12} heures`;
                    return `${hora12} heures ${minutos}`;
                },
                'de': () => {
                    if (minutos === 0) return `${hora12} Uhr`;
                    if (minutos === 15) return `Viertel nach ${hora12}`;
                    if (minutos === 30) return `halb ${hora12+1}`;
                    if (minutos === 45) return `Viertel vor ${(horas+1)%12 || 12}`;
                    return `${hora12} Uhr ${minutos}`;
                },
                'it': () => {
                    if (minutos === 0) return `${hora12} in punto`;
                    if (minutos === 15) return `${hora12} e un quarto`;
                    if (minutos === 30) return `${hora12} e mezza`;
                    if (minutos === 45) return `un quarto alle ${(horas+1)%12 || 12}`;
                    return `${hora12} e ${minutos} minuti`;
                },
                'pt': () => {
                    if (minutos === 0) return `${hora12} em ponto`;
                    if (minutos === 15) return `${hora12} e quinze`;
                    if (minutos === 30) return `${hora12} e meia`;
                    if (minutos === 45) return `um quarto para as ${(horas+1)%12 || 12}`;
                    return `${hora12} e ${minutos} minutos`;
                }
            };
            return textos[idioma] ? textos[idioma]() : textos['es']();
        }
        
        // ⭐⭐⭐ FUNCIÓN PRINCIPAL: DICE LA HORA DOS VECES ⭐⭐⭐
        function decirHoraDosVeces() {
            if (!activado) return;
            
            const texto = obtenerTextoHora();
            const ahora = new Date();
            
            console.log("🔊 Diciendo hora (primera vez):", texto);
            estadoSpan.innerHTML = `🗣️ "${texto}" (1/2)`;
            
            // Primera reproducción
            const utterance1 = new SpeechSynthesisUtterance(texto);
            utterance1.lang = idioma === 'es' ? 'es-ES' : 
                             idioma === 'en' ? 'en-US' :
                             idioma === 'fr' ? 'fr-FR' :
                             idioma === 'de' ? 'de-DE' :
                             idioma === 'it' ? 'it-IT' : 'pt-PT';
            utterance1.rate = 0.9;
            
            utterance1.onend = () => {
                console.log("✅ Primera vez terminada, esperando 0.8s para la segunda...");
                
                // Segunda reproducción después de 0.8 segundos
                setTimeout(() => {
                    console.log("🔊 Diciendo hora (segunda vez):", texto);
                    estadoSpan.innerHTML = `🗣️ "${texto}" (2/2)`;
                    
                    const utterance2 = new SpeechSynthesisUtterance(texto);
                    utterance2.lang = idioma === 'es' ? 'es-ES' : 
                                     idioma === 'en' ? 'en-US' :
                                     idioma === 'fr' ? 'fr-FR' :
                                     idioma === 'de' ? 'de-DE' :
                                     idioma === 'it' ? 'it-IT' : 'pt-PT';
                    utterance2.rate = 0.9;
                    
                    utterance2.onend = () => {
                        estadoSpan.innerHTML = "✅ Reloj activo - Próxima hora en 15 min";
                    };
                    
                    window.speechSynthesis.speak(utterance2);
                }, 800);
            };
            
            // Limpiar y reproducir primera vez
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance1);
        }
        
        // Función para probar (también dos veces)
        function probarVozDosVeces() {
            if (!activado) {
                estadoSpan.innerHTML = "⚠️ Primero activa el reloj";
                return;
            }
            
            const mensaje = idioma === 'es' ? "Prueba de voz" :
                           idioma === 'en' ? "Voice test" :
                           idioma === 'fr' ? "Test de voix" :
                           idioma === 'de' ? "Stimmentest" :
                           idioma === 'it' ? "Prova vocale" : "Teste de voz";
            
            console.log("🔊 Prueba (1/2):", mensaje);
            
            const u1 = new SpeechSynthesisUtterance(mensaje);
            u1.lang = idioma === 'es' ? 'es-ES' : 'en-US';
            u1.rate = 0.9;
            
            u1.onend = () => {
                setTimeout(() => {
                    console.log("🔊 Prueba (2/2):", mensaje);
                    const u2 = new SpeechSynthesisUtterance(mensaje);
                    u2.lang = idioma === 'es' ? 'es-ES' : 'en-US';
                    u2.rate = 0.9;
                    window.speechSynthesis.speak(u2);
                }, 600);
            };
            
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(u1);
        }
        
        // ============ RELOJ ============
        function actualizarReloj() {
            const ahora = new Date();
            horaSpan.innerHTML = ahora.toLocaleTimeString('es-ES', { hour12: false });
            
            if (!activado) return;
            
            const minutos = ahora.getMinutes();
            const segundos = ahora.getSeconds();
            const esCuarto = [0, 15, 30, 45].includes(minutos);
            
            if (esCuarto && segundos < 2 && minutos !== ultimoMinutoHablado) {
                console.log(`⏰ Hora de hablar! ${minutos} minutos`);
                decirHoraDosVeces();
                ultimoMinutoHablado = minutos;
            }
        }
        
        // ============ ACTIVAR TODO ============
        async function activar() {
            if (activado) {
                estadoSpan.innerHTML = "✅ Ya activado";
                return;
            }
            
            estadoSpan.innerHTML = "🔄 Activando...";
            console.log("🚀 ACTIVANDO MODO DOBLE VOZ");
            
            // 1. Micrófono
            await iniciarMicrofonoSilencioso();
            
            // 2. Ultrasonido
            await iniciarUltrasonido();
            
            // 3. Activar
            activado = true;
            estadoSpan.innerHTML = "✅ ACTIVADO - Dirá la hora DOS VECES cada 15 min";
            
            // 4. Decir hora de bienvenida (dos veces)
            setTimeout(() => {
                decirHoraDosVeces();
            }, 500);
        }
        
        // ============ LIMPIEZA ============
        window.addEventListener('beforeunload', () => {
            if (streamMic) {
                streamMic.getTracks().forEach(t => t.stop());
            }
            if (audioCtxUltra) {
                try { audioCtxUltra.close(); } catch(e) {}
            }
            if (ultraInterval) clearInterval(ultraInterval);
        });
        
        // ============ EVENTOS ============
        activarBtn.onclick = activar;
        probarBtn.onclick = probarVozDosVeces;
        
        idiomaSelect.onchange = (e) => {
            idioma = e.target.value;
            estadoSpan.innerHTML = `🌐 Idioma cambiado a ${idiomaSelect.options[idiomaSelect.selectedIndex].text}`;
        };
        
        // Precargar voz
        if ('speechSynthesis' in window) {
            const silent = new SpeechSynthesisUtterance('');
            silent.volume = 0;
            window.speechSynthesis.speak(silent);
        }
        
        // Múltiples temporizadores
        setInterval(actualizarReloj, 1000);
        setInterval(actualizarReloj, 500);
        actualizarReloj();
        
        console.log("✅ Listo - Dice la hora DOS VECES para asegurar");
    </script>
</body>
</html>
