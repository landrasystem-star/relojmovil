<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Reloj NFC</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0b3b3f, #1a2a3a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .reloj {
            background: rgba(0,0,0,0.7);
            padding: 2rem;
            border-radius: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
        }
        .hora {
            font-size: 4rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px #00ffcc;
            margin: 20px 0;
        }
        .estado {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 15px;
            margin: 15px 0;
            font-size: 0.9rem;
        }
        .badge {
            background: #27ae60;
            color: black;
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 10px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .info {
            font-size: 0.7rem;
            margin-top: 15px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="reloj">
        <div class="badge">🔊 RELOJ NFC</div>
        <h1>🗣️ Reloj que habla</h1>
        <div class="hora" id="horaPantalla">--:--:--</div>
        <div class="estado" id="estado">✅ Activo</div>
        <div class="info">⏰ Dice la hora cada 15 minutos</div>
    </div>

    <script>
        let ultimoMinutoHablado = -1;
        const horaPantalla = document.getElementById('horaPantalla');
        const estadoDiv = document.getElementById('estado');
        
        function formatearHora(date) {
            return date.toLocaleTimeString('es-ES', { hour12: false });
        }
        
        function obtenerTextoHora() {
            const ahora = new Date();
            let horas = ahora.getHours();
            let minutos = ahora.getMinutes();
            let hora12 = horas % 12;
            if (hora12 === 0) hora12 = 12;
            
            if (minutos === 0) return `${hora12} en punto`;
            if (minutos === 15) return `${hora12} y cuarto`;
            if (minutos === 30) return `${hora12} y media`;
            if (minutos === 45) {
                let sig = (horas + 1) % 12;
                if (sig === 0) sig = 12;
                return `un cuarto para las ${sig}`;
            }
            return `${hora12} y ${minutos} minutos`;
        }
        
        function decirHora() {
            const texto = obtenerTextoHora();
            const utterance = new SpeechSynthesisUtterance(texto);
            utterance.lang = 'es-ES';
            utterance.rate = 0.9;
            
            estadoDiv.innerHTML = `🗣️ "${texto}"`;
            
            utterance.onend = () => {
                setTimeout(() => {
                    if (estadoDiv.innerHTML.includes(texto)) {
                        estadoDiv.innerHTML = "✅ Próxima hora en 15 minutos";
                    }
                }, 2000);
            };
            
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }
        
        function actualizarReloj() {
            const ahora = new Date();
            horaPantalla.innerHTML = formatearHora(ahora);
            
            const minutos = ahora.getMinutes();
            const segundos = ahora.getSeconds();
            const esCuarto = [0, 15, 30, 45].includes(minutos);
            
            if (esCuarto && segundos === 0 && minutos !== ultimoMinutoHablado) {
                decirHora();
                ultimoMinutoHablado = minutos;
            }
        }
        
        setInterval(actualizarReloj, 1000);
        actualizarReloj();
        
        if ('speechSynthesis' in window) {
            const silent = new SpeechSynthesisUtterance('');
            silent.volume = 0;
            window.speechSynthesis.speak(silent);
        }
    </script>
</body>
</html>
