<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Reloj NFC - Siempre Activo</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0b3b3f, #1a2a3a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .reloj {
            background: rgba(0,0,0,0.7);
            padding: 2rem;
            border-radius: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
            backdrop-filter: blur(10px);
        }
        .hora {
            font-size: 4rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px #00ffcc;
            margin: 20px 0;
            letter-spacing: 5px;
        }
        .estado {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 15px;
            margin: 15px 0;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .badge {
            background: #27ae60;
            color: black;
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 10px;
            font-size: 0.75rem;
            font-weight: bold;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        .info {
            font-size: 0.7rem;
            margin-top: 15px;
            opacity: 0.7;
        }
        .proxima {
            background: rgba(255,255,0,0.2);
            padding: 8px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 0.8rem;
        }
        button {
            background: #3498db;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            margin-top: 15px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: transform 0.2s;
        }
        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="reloj">
        <div class="badge">🔊 RELOJ NFC - MODO SIEMPRE ACTIVO</div>
        <h1>🗣️ Reloj que habla</h1>
        <div class="hora" id="horaPantalla">--:--:--</div>
        <div class="estado" id="estado">🟢 Activo - Escuchando cuartos de hora</div>
        <div class="proxima" id="proximaHora">⏱️ Próximo anuncio: --</div>
        <div class="info">
            ⏰ Dice la hora cada 15 minutos<br>
            📱 La página sigue activa aunque la pantalla se apague<br>
            🔊 Mantén el volumen del dispositivo subido
        </div>
        <button onclick="forzarAnuncio()">🔊 Probar voz ahora</button>
    </div>

    <script>
        let ultimoMinutoHablado = -1;
        let audioContext = null;
        let keepAliveInterval = null;
        let proximoAnuncioTexto = document.getElementById('proximaHora');
        let estadoDiv = document.getElementById('estado');
        let horaPantalla = document.getElementById('horaPantalla');
        
        // === 1. SISTEMA KEEP-ALIVE PARA PANTALLA APAGADA ===
        function initKeepAlive() {
            // Crear audio contexto silencioso para mantener CPU activa
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const gainNode = audioContext.createGain();
                gainNode.gain.value = 0; // Silencio total
                gainNode.connect(audioContext.destination);
                
                // Reproducir un buffer silencioso cada 5 segundos
                const bufferSize = 4096;
                const scriptNode = audioContext.createScriptProcessor(bufferSize, 1, 1);
                scriptNode.onaudioprocess = function(e) {
                    // Buffer silencioso
                    const output = e.outputBuffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        output[i] = 0;
                    }
                };
                scriptNode.connect(gainNode);
                
                // Iniciar contexto (requiere interacción del usuario)
                const resumeAudio = () => {
                    if (audioContext.state === 'suspended') {
                        audioContext.resume();
                    }
                };
                document.addEventListener('click', resumeAudio);
                document.addEventListener('touchstart', resumeAudio);
                
                console.log('✅ Keep-alive activado');
            } catch(e) {
                console.log('AudioContext no soportado, usando método alternativo');
            }
            
            // Método alternativo: ping cada 10 segundos para mantener actividad
            keepAliveInterval = setInterval(() => {
                // Pequeña operación para mantener el thread activo
                const ahora = Date.now();
                console.log('🔄 Keep-alive ping');
            }, 10000);
        }
        
        // === 2. VERIFICAR VISIBILIDAD DE PÁGINA ===
        function handleVisibilityChange() {
            if (document.hidden) {
                console.log('📱 Pantalla apagada o pestaña en segundo plano - SIGO ACTIVO');
                estadoDiv.innerHTML = '📱 Pantalla apagada - SIGO FUNCIONANDO';
            } else {
                console.log('🔆 Pantalla encendida');
                estadoDiv.innerHTML = '✅ Activo - Próximo cuarto de hora';
            }
        }
        document.addEventListener('visibilitychange', handleVisibilityChange);
        
        // === 3. FORMATEO DE HORA MEJORADO ===
        function formatearHora(date) {
            return date.toLocaleTimeString('es-ES', { hour12: false });
        }
        
        function obtenerTextoHora() {
            const ahora = new Date();
            let horas = ahora.getHours();
            let minutos = ahora.getMinutes();
            let hora12 = horas % 12;
            if (hora12 === 0) hora12 = 12;
            
            if (minutos === 0) return `${hora12} en punto`;
            if (minutos === 15) return `${hora12} y cuarto`;
            if (minutos === 30) return `${hora12} y media`;
            if (minutos === 45) {
                let sig = (horas + 1) % 12;
                if (sig === 0) sig = 12;
                return `un cuarto para las ${sig}`;
            }
            return `${hora12} y ${minutos} minutos`;
        }
        
        function calcularProximoCuarto() {
            const ahora = new Date();
            const minutos = ahora.getMinutes();
            let proximoMinuto;
            
            if (minutos < 15) proximoMinuto = 15;
            else if (minutos < 30) proximoMinuto = 30;
            else if (minutos < 45) proximoMinuto = 45;
            else proximoMinuto = 60;
            
            const faltante = proximoMinuto - minutos;
            return `${faltante} minutos`;
        }
        
        // === 4. SISTEMA DE VOZ MEJORADO ===
        async function decirHora() {
            const texto = obtenerTextoHora();
            const ahora = new Date();
            const horas = ahora.getHours();
            const minutos = ahora.getMinutes();
            
            // Evitar anuncios duplicados
            if (ultimoMinutoHablado === minutos) return;
            
            console.log(`🗣️ Anunciando: "${texto}" a las ${horas}:${minutos}`);
            estadoDiv.innerHTML = `🗣️ Diciendo: "${texto}"`;
            
            // Asegurar que speechSynthesis esté disponible
            if (!('speechSynthesis' in window)) {
                estadoDiv.innerHTML = '❌ Voz no soportada en este navegador';
                return;
            }
            
            // Cancelar cualquier habla anterior
            window.speechSynthesis.cancel();
            
            // Pequeña pausa para asegurar cancelación
            await new Promise(resolve => setTimeout(resolve, 100));
            
            const utterance = new SpeechSynthesisUtterance(texto);
            utterance.lang = 'es-ES';
            utterance.rate = 0.9;
            utterance.volume = 1;
            
            utterance.onstart = () => {
                console.log('🎤 Inicio de voz');
            };
            
            utterance.onend = () => {
                console.log('✅ Voz completada');
                setTimeout(() => {
                    if (estadoDiv.innerHTML.includes(texto)) {
                        const minutosActuales = new Date().getMinutes();
                        if ([0,15,30,45].includes(minutosActuales)) {
                            estadoDiv.innerHTML = '✅ Anuncio completado';
                        } else {
                            estadoDiv.innerHTML = '✅ Esperando próximo cuarto de hora';
                        }
                    }
                }, 2000);
            };
            
            utterance.onerror = (e) => {
                console.error('❌ Error de voz:', e);
                estadoDiv.innerHTML = '⚠️ Error al hablar, reintentando...';
            };
            
            window.speechSynthesis.speak(utterance);
            ultimoMinutoHablado = minutos;
        }
        
        // Función para forzar anuncio (prueba)
        window.forzarAnuncio = function() {
            decirHora();
        };
        
        // === 5. ACTUALIZADOR DE RELOJ (MÁS PRECISO) ===
        let lastSecond = -1;
        
        function actualizarReloj() {
            const ahora = new Date();
            const horaStr = formatearHora(ahora);
            horaPantalla.innerHTML = horaStr;
            
            const minutos = ahora.getMinutes();
            const segundos = ahora.getSeconds();
            const esCuarto = [0, 15, 30, 45].includes(minutos);
            
            // Actualizar contador de próximo anuncio
            if (!esCuarto || segundos === 0) {
                const faltante = calcularProximoCuarto();
                proximoAnuncioTexto.innerHTML = `⏱️ Próximo anuncio en: ${faltante}`;
            }
            
            // Disparar anuncio exactamente en el segundo 0 del cuarto de hora
            if (esCuarto && segundos === 0 && minutos !== ultimoMinutoHablado) {
                decirHora();
            }
            
            // Mostrar estado si está activo
            if (segundos % 10 === 0) {
                console.log(`🕐 Hora actual: ${horaStr} - Anuncio pendiente: ${!esCuarto}`);
            }
        }
        
        // === 6. INICIALIZACIÓN CON MÚLTIPLES ESTRATEGIAS ===
        function iniciarReloj() {
            // Reloj principal
            setInterval(actualizarReloj, 1000);
            actualizarReloj();
            
            // Estrategia 1: Keep-alive con audio
            initKeepAlive();
            
            // Estrategia 2: Usar Web Worker para mantener actividad
            try {
                const workerBlob = new Blob([`
                    setInterval(() => {
                        // Worker silencioso para mantener el hilo principal activo
                        self.postMessage('ping');
                    }, 5000);
                `], {type: 'application/javascript'});
                const worker = new Worker(URL.createObjectURL(workerBlob));
                worker.onmessage = () => {
                    // Solo mantener vivo
                };
                console.log('✅ Web Worker activado para mantener actividad');
            } catch(e) {
                console.log('Web Worker no soportado');
            }
            
            // Estrategia 3: Pre-cargar el sistema de voz
            if ('speechSynthesis' in window) {
                // Inicializar síntesis de voz con un sonido silencioso
                const initUtterance = new SpeechSynthesisUtterance('');
                initUtterance.volume = 0;
                window.speechSynthesis.speak(initUtterance);
                console.log('🎤 Sistema de voz inicializado');
            }
            
            // Solicitar permiso para notificaciones (opcional, ayuda a mantener activo)
            if ('Notification' in window && Notification.permission !== 'granted') {
                Notification.requestPermission();
            }
            
            estadoDiv.innerHTML = '✅ Reloj siempre activo - Funciona con pantalla apagada';
            console.log('🚀 Reloj iniciado - Modo siempre activo');
        }
        
        // Iniciar cuando todo esté cargado
        window.addEventListener('load', iniciarReloj);
    </script>
</body>
</html>
