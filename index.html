<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Reloj NFC - Con Radio Fantasma</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0b3b3f, #1a2a3a);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .reloj {
            background: rgba(0,0,0,0.7);
            padding: 2rem;
            border-radius: 2rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .hora {
            font-size: 4rem;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px #00ffcc;
            margin: 20px 0;
        }
        .estado {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 15px;
            margin: 10px 0;
            font-size: 0.9rem;
        }
        button {
            background: #2ed573;
            border: none;
            color: black;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            margin: 10px;
            cursor: pointer;
        }
        .badge {
            background: #f39c12;
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        select {
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px;
            border-radius: 20px;
            margin: 10px;
        }
        .info {
            font-size: 0.7rem;
            margin-top: 15px;
            opacity: 0.7;
        }
        .debug {
            font-size: 0.6rem;
            margin-top: 10px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="reloj">
        <div class="badge">📻 RADIO FANTASMA ACTIVA</div>
        <h1>🗣️ Reloj Parlante</h1>
        <div class="hora" id="horaPantalla">--:--:--</div>
        
        <select id="idiomaSelect">
            <option value="es">🇪🇸 Español</option>
            <option value="en">🇺🇸 English</option>
            <option value="fr">🇫🇷 Français</option>
            <option value="de">🇩🇪 Deutsch</option>
            <option value="it">🇮🇹 Italiano</option>
            <option value="pt">🇵🇹 Português</option>
        </select>
        
        <button id="activarBtn">🎤 ACTIVAR RADIO FANTASMA</button>
        <button id="probarBtn">🔊 PROBAR VOZ</button>
        
        <div class="estado" id="estado">⚡ Presiona "ACTIVAR RADIO FANTASMA"</div>
        <div class="debug" id="debugInfo"></div>
        <div class="info">📻 Radio fantasma: sonido continuo e inaudible que mantiene el reloj vivo</div>
    </div>

    <script>
        // ============ VARIABLES ============
        let activado = false;
        let idioma = 'es';
        let ultimoMinutoHablado = -1;
        
        // ============ RECURSOS PARA RADIO FANTASMA ============
        let radioAudioContext = null;
        let radioSource = null;
        let radioGain = null;
        let radioInterval = null;
        let streamMic = null;
        
        // Elementos
        const horaSpan = document.getElementById('horaPantalla');
        const estadoSpan = document.getElementById('estado');
        const debugSpan = document.getElementById('debugInfo');
        const activarBtn = document.getElementById('activarBtn');
        const probarBtn = document.getElementById('probarBtn');
        const idiomaSelect = document.getElementById('idiomaSelect');
        
        // ============ GENERAR RUIDO ROSA (en tiempo real) ============
        function generarRuidoRosa(context, duracion) {
            const sampleRate = context.sampleRate;
            const samples = Math.floor(sampleRate * duracion);
            const buffer = context.createBuffer(1, samples, sampleRate);
            const data = buffer.getChannelData(0);
            
            // Ruido rosa: más agradable que blanco, menos brillante
            // Filtro simple para darle carácter de "radio"
            let b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0, b6 = 0;
            
            for (let i = 0; i < samples; i++) {
                const white = Math.random() * 2 - 1;
                b0 = 0.99886 * b0 + white * 0.0555179;
                b1 = 0.99332 * b1 + white * 0.0750759;
                b2 = 0.96900 * b2 + white * 0.1538520;
                b3 = 0.86650 * b3 + white * 0.3104856;
                b4 = 0.55000 * b4 + white * 0.5329522;
                b5 = -0.7616 * b5 - white * 0.0168980;
                const pink = b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362;
                b6 = white * 0.115926;
                data[i] = pink * 0.11; // Amplitud muy baja
            }
            
            return buffer;
        }
        
        // ============ INICIAR RADIO FANTASMA (FLUJO CONTINUO) ============
        async function iniciarRadioFantasma() {
            if (radioAudioContext && radioSource) {
                console.log("Radio fantasma ya activa");
                return true;
            }
            
            try {
                console.log("📻 Iniciando Radio Fantasma...");
                
                // 1. Crear AudioContext
                radioAudioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // 2. Crear buffer de ruido rosa (10 segundos)
                const bufferLargo = generarRuidoRosa(radioAudioContext, 10);
                
                // 3. Crear fuente y loop infinito
                radioSource = radioAudioContext.createBufferSource();
                radioSource.buffer = bufferLargo;
                radioSource.loop = true;
                
                // 4. Nodo de ganancia para volumen muy bajo
                radioGain = radioAudioContext.createGain();
                radioGain.gain.value = 0.001; // Volumen casi cero (inaudible)
                
                // 5. Conectar
                radioSource.connect(radioGain);
                radioGain.connect(radioAudioContext.destination);
                
                // 6. Iniciar
                if (radioAudioContext.state === 'suspended') {
                    await radioAudioContext.resume();
                }
                
                radioSource.start();
                
                // 7. Intervalo de mantenimiento (cada 30 segundos regenerar buffer para evitar silencios)
                radioInterval = setInterval(() => {
                    if (radioAudioContext && radioSource && activado) {
                        try {
                            if (radioAudioContext.state === 'suspended') {
                                radioAudioContext.resume();
                            }
                            
                            // Pequeño ping para mantener
                            const beep = radioAudioContext.createOscillator();
                            const beepGain = radioAudioContext.createGain();
                            beep.type = 'sine';
                            beep.frequency.value = 50; // Muy grave, casi inaudible
                            beepGain.gain.value = 0.0001;
                            beep.connect(beepGain);
                            beepGain.connect(radioAudioContext.destination);
                            beep.start();
                            beep.stop(radioAudioContext.currentTime + 0.1);
                            
                            debugSpan.innerHTML = `📻 Radio fantasma activa - Ping ${new Date().toLocaleTimeString()}`;
                            console.log("📻 Radio fantasma ping");
                        } catch(e) {}
                    }
                }, 25000);
                
                console.log("✅ Radio Fantasma activa (ruido rosa inaudible)");
                return true;
                
            } catch(e) {
                console.error("❌ Error iniciando radio fantasma:", e);
                return false;
            }
        }
        
        // ============ MICRÓFONO DE RESPALDO ============
        async function iniciarMicrofonoSilencioso() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                streamMic = stream;
                console.log("🎤 Micrófono de respaldo activo");
                return true;
            } catch(e) {
                console.log("⚠️ Sin micrófono, solo radio fantasma");
                return false;
            }
        }
        
        // ============ FUNCIONES DE VOZ (DOBLE REPRODUCCIÓN) ============
        function obtenerTextoHora() {
            const ahora = new Date();
            let horas = ahora.getHours();
            let minutos = ahora.getMinutes();
            let hora12 = horas % 12;
            if (hora12 === 0) hora12 = 12;
            
            const textos = {
                'es': () => {
                    if (minutos === 0) return `${hora12} en punto`;
                    if (minutos === 15) return `${hora12} y cuarto`;
                    if (minutos === 30) return `${hora12} y media`;
                    if (minutos === 45) return `un cuarto para las ${(horas+1)%12 || 12}`;
                    return `${hora12} y ${minutos} minutos`;
                },
                'en': () => {
                    const ampm = horas < 12 ? 'AM' : 'PM';
                    if (minutos === 0) return `${hora12} o'clock ${ampm}`;
                    if (minutos === 15) return `quarter past ${hora12} ${ampm}`;
                    if (minutos === 30) return `half past ${hora12} ${ampm}`;
                    if (minutos === 45) return `quarter to ${(horas+1)%12 || 12} ${ampm}`;
                    return `${hora12} ${minutos} ${ampm}`;
                },
                'fr': () => {
                    if (minutos === 0) return `${hora12} heures`;
                    if (minutos === 15) return `${hora12} heures et quart`;
                    if (minutos === 30) return `${hora12} heures et demie`;
                    if (minutos === 45) return `moins le quart ${(horas+1)%12 || 12} heures`;
                    return `${hora12} heures ${minutos}`;
                },
                'de': () => {
                    if (minutos === 0) return `${hora12} Uhr`;
                    if (minutos === 15) return `Viertel nach ${hora12}`;
                    if (minutos === 30) return `halb ${hora12+1}`;
                    if (minutos === 45) return `Viertel vor ${(horas+1)%12 || 12}`;
                    return `${hora12} Uhr ${minutos}`;
                },
                'it': () => {
                    if (minutos === 0) return `${hora12} in punto`;
                    if (minutos === 15) return `${hora12} e un quarto`;
                    if (minutos === 30) return `${hora12} e mezza`;
                    if (minutos === 45) return `un quarto alle ${(horas+1)%12 || 12}`;
                    return `${hora12} e ${minutos} minuti`;
                },
                'pt': () => {
                    if (minutos === 0) return `${hora12} em ponto`;
                    if (minutos === 15) return `${hora12} e quinze`;
                    if (minutos === 30) return `${hora12} e meia`;
                    if (minutos === 45) return `um quarto para as ${(horas+1)%12 || 12}`;
                    return `${hora12} e ${minutos} minutos`;
                }
            };
            return textos[idioma] ? textos[idioma]() : textos['es']();
        }
        
        // Decir hora DOS VECES
        function decirHoraDosVeces() {
            if (!activado) return;
            
            const texto = obtenerTextoHora();
            
            console.log("🔊 Diciendo hora (1/2):", texto);
            estadoSpan.innerHTML = `🗣️ "${texto}" (1/2)`;
            
            const utterance1 = new SpeechSynthesisUtterance(texto);
            utterance1.lang = idioma === 'es' ? 'es-ES' : 
                             idioma === 'en' ? 'en-US' :
                             idioma === 'fr' ? 'fr-FR' :
                             idioma === 'de' ? 'de-DE' :
                             idioma === 'it' ? 'it-IT' : 'pt-PT';
            utterance1.rate = 0.9;
            
            utterance1.onend = () => {
                setTimeout(() => {
                    console.log("🔊 Diciendo hora (2/2):", texto);
                    estadoSpan.innerHTML = `🗣️ "${texto}" (2/2)`;
                    
                    const utterance2 = new SpeechSynthesisUtterance(texto);
                    utterance2.lang = idioma === 'es' ? 'es-ES' : 
                                     idioma === 'en' ? 'en-US' :
                                     idioma === 'fr' ? 'fr-FR' :
                                     idioma === 'de' ? 'de-DE' :
                                     idioma === 'it' ? 'it-IT' : 'pt-PT';
                    utterance2.rate = 0.9;
                    
                    utterance2.onend = () => {
                        estadoSpan.innerHTML = "✅ Reloj activo - Radio fantasma funcionando";
                    };
                    
                    window.speechSynthesis.speak(utterance2);
                }, 800);
            };
            
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance1);
        }
        
        function probarVoz() {
            if (!activado) {
                estadoSpan.innerHTML = "⚠️ Primero activa el reloj";
                return;
            }
            
            const mensaje = idioma === 'es' ? "Prueba de voz funcionando" :
                           idioma === 'en' ? "Voice test working" : "Test de voix";
            
            const u1 = new SpeechSynthesisUtterance(mensaje);
            u1.lang = idioma === 'es' ? 'es-ES' : 'en-US';
            u1.rate = 0.9;
            
            u1.onend = () => {
                setTimeout(() => {
                    const u2 = new SpeechSynthesisUtterance(mensaje);
                    u2.lang = idioma === 'es' ? 'es-ES' : 'en-US';
                    u2.rate = 0.9;
                    window.speechSynthesis.speak(u2);
                }, 600);
            };
            
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(u1);
        }
        
        // ============ RELOJ ============
        function actualizarReloj() {
            const ahora = new Date();
            horaSpan.innerHTML = ahora.toLocaleTimeString('es-ES', { hour12: false });
            
            if (!activado) return;
            
            const minutos = ahora.getMinutes();
            const segundos = ahora.getSeconds();
            const esCuarto = [0, 15, 30, 45].includes(minutos);
            
            if (esCuarto && segundos < 2 && minutos !== ultimoMinutoHablado) {
                console.log(`⏰ Hora de hablar! ${minutos} minutos`);
                decirHoraDosVeces();
                ultimoMinutoHablado = minutos;
            }
        }
        
        // ============ ACTIVAR TODO ============
        async function activar() {
            if (activado) {
                estadoSpan.innerHTML = "✅ Ya activado";
                return;
            }
            
            estadoSpan.innerHTML = "🔄 Activando Radio Fantasma...";
            console.log("📻 INICIANDO RADIO FANTASMA");
            
            // 1. Iniciar radio fantasma (LO MÁS IMPORTANTE)
            const radioOk = await iniciarRadioFantasma();
            
            // 2. Micrófono de respaldo
            await iniciarMicrofonoSilencioso();
            
            // 3. Activar
            activado = true;
            
            if (radioOk) {
                estadoSpan.innerHTML = "✅ RADIO FANTASMA ACTIVA - El reloj hablará con pantalla apagada";
            } else {
                estadoSpan.innerHTML = "⚠️ Radio fantasma no disponible, modo limitado";
            }
            
            // 4. Decir hora de bienvenida
            setTimeout(() => {
                decirHoraDosVeces();
            }, 500);
        }
        
        // ============ LIMPIEZA ============
        window.addEventListener('beforeunload', () => {
            if (radioSource) {
                try { radioSource.stop(); } catch(e) {}
            }
            if (radioAudioContext) {
                try { radioAudioContext.close(); } catch(e) {}
            }
            if (radioInterval) clearInterval(radioInterval);
            if (streamMic) {
                streamMic.getTracks().forEach(t => t.stop());
            }
        });
        
        // ============ EVENTOS ============
        activarBtn.onclick = activar;
        probarBtn.onclick = probarVoz;
        
        idiomaSelect.onchange = (e) => {
            idioma = e.target.value;
            estadoSpan.innerHTML = `🌐 Idioma: ${idiomaSelect.options[idiomaSelect.selectedIndex].text}`;
        };
        
        // Precargar voz
        if ('speechSynthesis' in window) {
            const silent = new SpeechSynthesisUtterance('');
            silent.volume = 0;
            window.speechSynthesis.speak(silent);
        }
        
        // Reloj
        setInterval(actualizarReloj, 1000);
        setInterval(actualizarReloj, 500);
        actualizarReloj();
        
        console.log("✅ Radio Fantasma lista - Ruido rosa continuo e inaudible");
    </script>
</body>
</html>
